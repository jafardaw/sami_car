<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>عناية سامي | التطبيق</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;600;700;800&family=Readex+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --org:#CE9234; --org-d:#A6741F; --org-soft:#F6E7C8;
  --ink:#221F1F; --mute:#8A7B6C; --soft:#B3A594;
  --bg:#FBFAF6; --card:#FFFFFF; --line:rgba(140,110,80,.16);
  --dark:#1B140D; --dark2:#241B10; --gold:#E8BE6C; --gold-d:#CE9234;
  --green:#2E8B57;
  --ease:cubic-bezier(.33,.9,.35,1); --dur:.25s;
  --fd:'Noto Kufi Arabic',serif; --fb:'Readex Pro',sans-serif;
  --r:18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:var(--fb);background:#F4F2EC;color:var(--ink);-webkit-font-smoothing:antialiased}
img{max-width:100%;display:block}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
::selection{background:var(--org);color:#fff}
.app{max-width:430px;margin-inline:auto;min-height:100dvh;background:var(--bg);position:relative;
  box-shadow:0 0 60px rgba(60,40,20,.25)}
/* ===== الهيدر ===== */
.hd{position:sticky;top:0;z-index:300;background:rgba(247,243,238,.92);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line)}
.hd .in{display:flex;align-items:center;gap:10px;padding:12px 16px}
.hd .bell{position:relative;width:42px;height:42px;border-radius:50%;display:grid;place-items:center;color:var(--ink);flex:none}
.hd .bell .bdg{position:absolute;top:2px;left:2px;min-width:17px;height:17px;border-radius:9px;background:var(--org);
  color:#fff;font-size:10px;font-weight:700;display:grid;place-items:center;padding-inline:4px}
.hd .logo{flex:1;display:flex;justify-content:center;align-items:center}
.hd .logo img{height:34px!important;width:auto!important;object-fit:contain}
.hd .logo b,.hd .logo small{display:none}
.hd .loc{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--ink);
  background:#fff;border:1px solid var(--line);border-radius:999px;padding:9px 14px;flex:none}
.hd .loc svg{color:var(--org)}
.hd .burger{width:42px;height:42px;display:grid;place-items:center;color:var(--ink);flex:none}
.hexa{width:34px;height:34px}
.app.home-shell .hd{position:absolute;top:0;right:0;left:0;z-index:305;background:linear-gradient(180deg,rgba(8,5,3,.5),rgba(8,5,3,0));backdrop-filter:none;border-bottom:0}
.app.home-shell .hd .in{padding-top:calc(12px + env(safe-area-inset-top))}
.app.home-shell .hd .bell,.app.home-shell .hd .burger{color:#F9E9C5;background:rgba(255,255,255,.08);border:1px solid rgba(232,190,108,.24);backdrop-filter:blur(10px);box-shadow:0 12px 24px -18px rgba(0,0,0,.7)}
.app.home-shell .hd .bell .bdg{background:linear-gradient(135deg,var(--gold),var(--org));color:#1B140D}
.app.home-shell .hd .logo{color:#fff;text-shadow:0 8px 22px rgba(0,0,0,.55)}
.app.home-shell .hd .logo img{opacity:.76;filter:drop-shadow(0 10px 20px rgba(0,0,0,.55))}
.app.home-shell .hd .loc{color:#F9E9C5;background:rgba(255,255,255,.08);border-color:rgba(232,190,108,.24);backdrop-filter:blur(10px);box-shadow:0 12px 24px -18px rgba(0,0,0,.7)}
.app.home-shell .hd .loc svg{color:#F4D48E}
/* ===== شريط التنقل السفلي ===== */
.tabbar{position:fixed;bottom:0;right:50%;transform:translateX(50%);width:100%;max-width:430px;z-index:320;
  background:rgba(255,255,255,.96);backdrop-filter:blur(14px);border-top:1px solid var(--line);
  display:grid;grid-template-columns:repeat(5,1fr);padding:8px 6px calc(10px + env(safe-area-inset-bottom));direction:ltr}
.tab{display:flex;flex-direction:column;align-items:center;gap:4px;padding:7px 4px;font-size:10.5px;color:var(--soft);
  min-height:44px;border-radius:12px;transition:color var(--dur);direction:rtl}
.tab svg{transition:transform .25s var(--ease)}
.tab.on{color:var(--org);font-weight:700}
.tab.on svg{transform:translateY(-2px)}
.tab .tbdg{position:absolute;margin-top:-4px;margin-inline-start:20px;min-width:16px;height:16px;border-radius:8px;
  background:var(--org);color:#fff;font-size:9.5px;font-weight:700;display:grid;place-items:center;padding-inline:4px;
  transition:transform .3s var(--ease)}
.tab .tbdg.hide{display:none}
.tab .tbdg.pop{transform:scale(1.35)}
/* ===== عناصر عامة ===== */
.screen{display:none;padding-bottom:96px;animation:scrIn .35s var(--ease)}
.screen.on{display:block}
@keyframes scrIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.sec{padding:18px 16px 4px}
.sec-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.sec-h h2{font-family:var(--fd);font-weight:700;font-size:16.5px;color:var(--ink);display:flex;gap:8px;align-items:center}
.sec-h h2 .hi{color:var(--org)}
.sec-h a{font-size:12px;color:var(--org);font-weight:700;display:flex;gap:5px;align-items:center}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:46px;padding:12px 24px;
  border-radius:14px;font-size:13.5px;font-weight:700;transition:transform var(--dur) var(--ease),box-shadow var(--dur),opacity var(--dur)}
.btn:active{transform:scale(.97)}
.btn-org{background:var(--org);color:#fff;box-shadow:0 10px 22px -10px rgba(206,146,52,.55)}
.btn-org:hover{box-shadow:0 14px 26px -10px rgba(206,146,52,.6)}
.btn-line{border:1.5px solid var(--org);color:var(--org);background:rgba(255,255,255,.9)}
.btn-lite{border:1px solid var(--line);color:var(--ink);background:#fff}
.btn-w{border:1.5px solid rgba(255,255,255,.85);color:#fff;background:rgba(255,255,255,.08);backdrop-filter:blur(4px)}
.btn:disabled{opacity:.45}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  box-shadow:0 10px 24px -18px rgba(90,60,30,.25)}
/* سلايدر أفقي RTL بسناب */
.hscroll{display:flex;gap:12px;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;
  padding:2px 16px 14px;scroll-padding-inline:16px}
.hscroll::-webkit-scrollbar{display:none}
.hscroll>*{scroll-snap-align:start;flex:none}
.dots{display:flex;gap:6px;justify-content:center}
.dots i{width:7px;height:7px;border-radius:4px;background:#D9CFC0;transition:all .3s var(--ease)}
.dots i.on{width:20px;background:var(--org)}
/* توست */
.toast{position:fixed;bottom:104px;right:50%;transform:translate(50%,16px);z-index:400;opacity:0;pointer-events:none;
  background:var(--ink);color:#fff;padding:12px 22px;border-radius:999px;font-size:12.5px;font-weight:600;
  display:flex;gap:8px;align-items:center;transition:all .35s var(--ease);max-width:88%;text-align:center;
  box-shadow:0 16px 34px -12px rgba(0,0,0,.4)}
.toast.on{opacity:1;transform:translate(50%,0)}
.toast .ti{width:20px;height:20px;border-radius:50%;background:var(--org);display:grid;place-items:center;flex:none}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}

/* ===== محاكي خطوات الحجز للموبايل ===== */
.wiz-container { display: flex; flex-direction: column; min-height: calc(100vh - 140px); background: var(--bg); padding: 16px; animation: scrIn .3s var(--ease); }
.wiz-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.wiz-close { width: 36px; height: 36px; display: grid; place-items: center; border-radius: 50%; background: #fff; border: 1px solid var(--line); }
.wiz-title { font-family: var(--fd); font-weight: 700; font-size: 15px; color: var(--ink); }
.wiz-step-num { font-size: 12px; font-weight: 700; color: var(--org); }
.wiz-progress { height: 4px; background: rgba(140,110,80,.1); border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
.wiz-progress-bar { height: 100%; background: var(--org); transition: width .3s var(--ease); }
.wiz-content { flex: 1; display: flex; flex-direction: column; gap: 16px; margin-bottom: 70px; }
.wiz-footer { position: fixed; bottom: 0; right: 50%; transform: translateX(50%); width: 100%; max-width: 430px; z-index: 310;
  background: #fff; border-top: 1px solid var(--line); padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
  display: flex; gap: 10px; }

/* كروت الفروع في الموبايل */
.w-br-card { display: flex; align-items: center; gap: 12px; padding: 14px; background: #fff; border: 1.5px solid var(--line); border-radius: 16px; cursor: pointer; transition: all .25s var(--ease); }
.w-br-card.sel { border-color: var(--org); background: var(--org-soft); }
.w-br-ic { width: 40px; height: 40px; border-radius: 12px; background: rgba(206,146,52,.1); color: var(--org); display: grid; place-items: center; }
.w-br-info { flex: 1; display: flex; flex-direction: column; gap: 2px; text-align: right; }
.w-br-info b { font-size: 13.5px; color: var(--ink); }
.w-br-info small { font-size: 11px; color: var(--mute); }

/* الموظفين */
.w-emps-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.w-emp-card { padding: 16px; background: #fff; border: 1.5px solid var(--line); border-radius: 16px; text-align: center; cursor: pointer; transition: all .25s var(--ease); }
.w-emp-card.sel { border-color: var(--org); background: var(--org-soft); }
.w-emp-card .av { width: 44px; height: 44px; border-radius: 50%; background: var(--org); color: #fff; font-size: 16px; font-weight: 700; display: grid; place-items: center; margin: 0 auto 8px; }
.w-emp-card b { font-size: 13px; display: block; color: var(--ink); }

/* الأوقات والتواريخ */
.w-dates-track { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding-bottom: 6px; }
.w-date-chip { flex: 0 0 64px; height: 74px; border-radius: 14px; background: #fff; border: 1.5px solid var(--line); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; }
.w-date-chip.sel { border-color: var(--org); background: var(--org-soft); color: var(--org-d); }
.w-date-chip span { font-size: 10px; color: var(--mute); }
.w-date-chip b { font-size: 16px; }

.w-slots-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-height: 180px; overflow-y: auto; padding: 4px; }
.w-slot { height: 40px; border-radius: 10px; border: 1.5px solid var(--line); background: #fff; font-size: 12.5px; font-weight: 700; display: grid; place-items: center; cursor: pointer; }
.w-slot.sel { border-color: var(--org); background: var(--org); color: #fff; }

/* خطة الجلسة المنسقة (الموبايل) */
.w-plan-track { display: flex; flex-direction: column; gap: 8px; position: relative; padding-right: 18px; margin-top: 10px; }
.w-plan-track::before { content: ""; position: absolute; top: 8px; bottom: 8px; right: 8px; width: 1.5px; background: var(--org); }
.w-plan-item { position: relative; padding: 10px 12px; border-radius: 10px; border: 1.5px solid var(--line); background: #fff; margin-right: 10px; text-align: right; }
.w-plan-item::before { content: ""; position: absolute; top: 50%; right: -23px; width: 8px; height: 8px; border-radius: 50%; background: var(--org-d); transform: translateY(-50%); border: 1.5px solid #fff; }
.w-plan-item.break::before { background: var(--org); width: 10px; height: 10px; right: -24px; }
.w-plan-item b { font-size: 12px; display: block; }
.w-plan-item small { font-size: 10.5px; color: var(--mute); display: block; }
.w-plan-item .t { font-size: 11px; font-weight: 700; margin-top: 4px; display: block; }

/* الدفع */
.w-pay-card { display: flex; align-items: center; justify-content: space-between; padding: 14px; background: #fff; border: 1.5px solid var(--line); border-radius: 16px; cursor: pointer; }
.w-pay-card.sel { border-color: var(--org); background: var(--org-soft); }
.w-pay-card span { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 13.5px; }

/* الإهداء */
.w-gift-toggle { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; background: #fff; border: 1px solid var(--line); border-radius: 14px; margin-bottom: 12px; }
.w-switch { width: 44px; height: 24px; border-radius: 12px; background: #D9CFC0; position: relative; cursor: pointer; transition: background .3s; }
.w-switch::after { content: ""; position: absolute; top: 2px; right: 2px; width: 20px; height: 20px; border-radius: 50%; background: #fff; transition: transform .3s; }
.w-switch.on { background: var(--green); }
.w-switch.on::after { transform: translateX(-20px); }
.w-gift-fields { display: flex; flex-direction: column; gap: 10px; padding: 12px; background: rgba(140,110,80,.05); border-radius: 14px; }
.w-gift-fields input { border: 1px solid var(--line); border-radius: 10px; padding: 10px; font-size: 13px; width: 100%; outline: none; background: #fff; }

/* ===== حجز موعد مطابق للموقع لكن بصياغة تطبيق موبايل ===== */
.m-book{min-height:calc(100dvh - 68px);background:linear-gradient(180deg,#FBFAF6 0%,#F3F1EA 100%);padding:14px 14px 96px}
.m-book-head{position:sticky;top:67px;z-index:60;margin:-14px -14px 14px;padding:12px 14px;background:rgba(247,243,238,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.m-top{display:flex;align-items:center;gap:10px}.m-top .ttl{flex:1;text-align:center}.m-top b{display:block;font-family:var(--fd);font-size:15px}.m-top small{font-size:11px;color:var(--mute)}
.m-close{width:38px;height:38px;border-radius:50%;background:#fff;border:1px solid var(--line);display:grid;place-items:center}.m-count{font-size:12px;font-weight:800;color:var(--org)}
.m-steps{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding-top:12px}.m-steps::-webkit-scrollbar{display:none}
.m-step{flex:0 0 72px;text-align:center;color:#B3A594}.m-step i{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;margin:0 auto 5px;background:#fff;border:1px solid var(--line);font-style:normal}.m-step span{font-size:9.5px;white-space:nowrap}.m-step.on i{background:linear-gradient(135deg,var(--gold),var(--org));color:#1B140D;border-color:transparent;box-shadow:0 8px 22px -12px rgba(166,116,31,.8)}.m-step.on span{color:var(--org-d);font-weight:800}.m-step.done i{border-color:var(--org);color:var(--org)}
.m-panel-title{text-align:center;margin:18px 6px 16px}.m-panel-title h1{font-family:var(--fd);font-size:25px;line-height:1.35}.m-panel-title p{font-size:12.5px;color:var(--mute);line-height:1.8;margin-top:7px}
.m-stack{display:grid;gap:12px}.m-card{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:0 14px 30px -24px rgba(80,50,20,.32);overflow:hidden}.m-card.sel{border-color:var(--org);box-shadow:0 16px 34px -22px rgba(206,146,52,.65)}
.m-branch-img{position:relative;aspect-ratio:16/9;background:#21170D}.m-branch-img img{width:100%;height:100%;object-fit:cover}.m-branch-img .flag{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.93);color:var(--org-d);border-radius:999px;padding:7px 12px;font-size:11px;font-weight:800}
.m-card-body{padding:14px}.m-card-body h3{font-family:var(--fd);font-size:19px;color:var(--ink)}.m-card-body .addr{font-size:12.5px;color:var(--mute);margin:5px 0 10px}.m-meta{display:flex;flex-wrap:wrap;gap:7px}.m-meta span{font-size:10.5px;background:#FBFAF6;border:1px solid var(--line);border-radius:999px;padding:6px 9px}.m-pick{margin-top:13px;width:100%;min-height:42px;border-radius:13px;background:var(--org);color:#fff;font-weight:800}
.m-summary-mini{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;display:grid;gap:8px}.m-summary-mini .row{display:flex;justify-content:space-between;gap:10px;font-size:12px;color:var(--mute)}.m-summary-mini b{color:var(--ink)}
.m-cat-row{display:flex;gap:9px;overflow-x:auto;scrollbar-width:none;padding:2px 2px 10px}.m-cat-row::-webkit-scrollbar{display:none}.m-cat{flex:0 0 106px;height:94px;border-radius:16px;overflow:hidden;position:relative;color:#fff;background:#20170E;border:2px solid transparent}.m-cat img{width:100%;height:100%;object-fit:cover;filter:brightness(.68)}.m-cat span{position:absolute;inset-inline:8px;bottom:9px;font-weight:800;font-size:12px}.m-cat.sel{border-color:var(--gold)}
.m-sub-block{display:grid;gap:9px}.m-sub-title{display:flex;justify-content:space-between;align-items:center;font-weight:800;font-family:var(--fd);padding-inline:3px}.m-sub-title small{font-family:var(--fb);font-size:11px;color:var(--mute)}
.m-service{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:start;background:#fff;border:1.5px solid var(--line);border-radius:15px;padding:12px}.m-service.sel{border-color:var(--org);background:#FFF9EE}.m-service .emoji{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;background:var(--org-soft)}.m-service b{font-size:13.5px}.m-service small{display:block;color:var(--mute);font-size:11px;line-height:1.6}.m-service .price{text-align:left;color:var(--org-d);font-weight:900;font-size:13px;white-space:nowrap}
.m-mode{padding:16px;border-radius:18px;background:#fff;border:1.5px solid var(--line);display:grid;gap:9px}.m-mode.dark{background:linear-gradient(145deg,#1B140D,#2B2115);color:#fff}.m-mode.sel{border-color:var(--gold);box-shadow:0 16px 34px -24px rgba(206,146,52,.85)}.m-mode h3{font-family:var(--fd);font-size:18px}.m-mode p,.m-mode li{font-size:12px;line-height:1.8;color:inherit;opacity:.82}.m-mode ul{padding:0 18px 0 0}
.m-emp-sec{display:grid;gap:0;background:#fff;border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:0 14px 30px -24px rgba(80,50,20,.32)}
.m-emp-row{display:grid;grid-template-columns:112px 1fr;min-height:146px}
.m-emp-cat{display:grid;align-content:center;justify-items:center;gap:8px;padding:14px;color:#fff;font-family:var(--fd);font-weight:800;text-align:center}
.m-emp-cat .cat-ico{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;border:1px solid rgba(255,255,255,.45);background:rgba(255,255,255,.12)}
.m-emp-cat small{font-family:var(--fb);font-size:10px;color:rgba(255,255,255,.82)}
.m-emp-list{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding:12px;background:linear-gradient(180deg,#fff,#FFFDF9)}.m-emp-list::-webkit-scrollbar{display:none}
.m-emp{flex:0 0 112px;min-height:122px;background:#fff;border:1.5px solid var(--line);border-radius:15px;padding:10px;text-align:center;position:relative;box-shadow:0 10px 22px -20px rgba(80,50,20,.3)}
.m-emp.sel{border-color:var(--org);background:#FFF9EE;box-shadow:0 14px 26px -20px rgba(206,146,52,.75)}
.m-emp.sel::after{content:"✓";position:absolute;top:8px;left:8px;width:20px;height:20px;border-radius:50%;display:grid;place-items:center;background:var(--org);color:#fff;font-size:12px;font-weight:900}
.m-emp .av{width:58px;height:58px;border-radius:16px;margin:0 auto 8px;display:grid;place-items:center;color:#fff;font-weight:900;font-size:16px;background:linear-gradient(145deg,#D8D3CC,#F8F6F2);box-shadow:inset 0 -18px 28px rgba(0,0,0,.08);overflow:hidden}
.m-emp:not(.any) .av::before{content:"";width:36px;height:44px;border-radius:18px 18px 10px 10px;background:linear-gradient(180deg,#17130E 0 24%,#C08A52 24% 43%,#1B1712 43%);box-shadow:0 8px 16px -10px rgba(0,0,0,.6)}
.m-emp.any{border-style:dashed;background:#FFFDF9}
.m-emp.any .av{background:#fff;color:#111;border:1px solid var(--line);box-shadow:none}
.m-emp b{font-size:11.5px;display:block;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.m-emp small{display:block;color:var(--mute);font-size:10px;margin-top:4px}
.m-cal{background:#fff;border:1px solid var(--line);border-radius:18px;padding:13px}.m-cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.m-cal-head button{width:31px;height:31px;border-radius:10px;border:1px solid var(--line);display:grid;place-items:center}.m-days,.m-cells{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;text-align:center}.m-days span{font-size:9.5px;color:var(--mute)}.m-cells button{height:34px;border-radius:10px;background:#FBFAF6;color:var(--ink);font-size:12px}.m-cells button.avail{background:#fff;border:1px solid var(--line)}.m-cells button.sel{background:var(--org);color:#fff}.m-cells button:disabled{opacity:.35}

}
function syncAppAddButtons(id){
 const inCart=S.cart.has(id);
 $$(`[data-add="${id}"]`).forEach(btn=>{
  btn.classList.toggle('added',inCart);
  btn.innerHTML=btn.classList.contains('cart-pill')?(inCart?'مضاف للسلة ':'إضافة للسلة ')+addIcon(inCart):addIcon(inCart);
 });

 if(sheetBtn&&sheetBtn.dataset.id===id){
  sheetBtn.classList.toggle('added',inCart);
  sheetBtn.innerHTML=(inCart?'إزالة من السلة ':'إضافة للسلة ')+addIcon(inCart);
 }

  ov=$('#bsOv');sheet=$('#bs');

function wheelSVG(){
 const n=WHEEL.length,r=70,cx=75,cy=75;
 let segs='';
 for(let i=0;i<n;i++){
  const a0=(i*360/n-90)*Math.PI/180,a1=((i+1)*360/n-90)*Math.PI/180;
  const x0=cx+r*Math.cos(a0),y0=cy+r*Math.sin(a0),x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
  const mid=(i+.5)*360/n;
  segs+=`<path d="M${cx} ${cy} L${x0.toFixed(1)} ${y0.toFixed(1)} A${r} ${r} 0 0 1 ${x1.toFixed(1)} ${y1.toFixed(1)} Z" fill="${WHEEL[i].c}" stroke="#CE9234" stroke-width=".8"/>
   <text x="${cx}" y="${cy-r+16}" transform="rotate(${mid} ${cx} ${cy})" text-anchor="middle" font-size="6.5" font-weight="700" fill="${WHEEL[i].c==='#F7F1E4'?'#7A5A20':'#E8BE6C'}">${WHEEL[i].n}</text>`;
 }
 return`<svg id="wheelSvg" viewBox="0 0 150 150">
  <defs>
   <radialGradient id="wheelFace" cx="36%" cy="28%" r="72%">
    <stop offset="0" stop-color="#FFF0C2"/><stop offset=".22" stop-color="#E8BE6C"/><stop offset=".6" stop-color="#9C6B1F"/><stop offset="1" stop-color="#3A250B"/>
   </radialGradient>
   <linearGradient id="rimGold" x1="24" y1="10" x2="128" y2="142">
    <stop offset="0" stop-color="#FFF0C2"/><stop offset=".44" stop-color="#CE9234"/><stop offset="1" stop-color="#5A390F"/>
   </linearGradient>
   <filter id="wheelBevel" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000" flood-opacity=".55"/>
   </filter>
  </defs>
  <circle cx="75" cy="77" r="70" fill="#5A390F" opacity=".75"/>
  <circle cx="75" cy="75" r="73" fill="url(#rimGold)" filter="url(#wheelBevel)"/>
  <circle cx="75" cy="75" r="67" fill="#140E07" stroke="#FFF0C2" stroke-width=".7"/>
  ${segs}
  <circle cx="75" cy="75" r="69" fill="none" stroke="rgba(255,255,255,.38)" stroke-width="1"/>
  <circle cx="75" cy="75" r="21" fill="url(#wheelFace)" stroke="#FFF0C2" stroke-width="1.3"/>
  <circle cx="75" cy="75" r="10" fill="#1B140D" stroke="#F2C96D" stroke-width="1"/>
  <path d="M75 66l8 4.6v9.2L75 84.4l-8-4.6v-9.2z" fill="none" stroke="#1B140D" stroke-width="1.2" opacity=".8"/></svg>`;
}

/* ================= محاكي حجز الموعد التفاعلي الكامل للموبايل (خطوات الموقع الـ 6) ================= */
function getWizDays() {
  const arr = [];
  const start = new Date(2026, 6, 9); // يوليو 9، 2026
  for (let i = 0; i < 7; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    arr.push(d);
  }
  return arr;
}
function getWizSlots() {
  const arr = [];
  for (let h = 9; h < 24; h++) {
    arr.push({ t: h * 60, s: `${h > 12 ? h - 12 : h}:00 ${h >= 12 ? 'م' : 'ص'}` });
    arr.push({ t: h * 60 + 30, s: `${h > 12 ? h - 12 : h}:30 ${h >= 12 ? 'م' : 'ص'}` });
  }
  return arr;
}
function wizTotalDur() {
  const cut = CUTS.find(c => c.id === S.bookCut);
  if (!cut) return 0;
  let dur = cut.dur;
  S.bookExtras.forEach(() => dur += 20); // 20 دقيقة لكل إضافة
  const totalItems = 1 + S.bookExtras.size;
  if (totalItems > 1) {
    dur += (totalItems - 1) * 15; // 15 دقيقة استراحة بين الخدمات
  }
  return dur;
}
function fmtWizTime(t) {
  const h = Math.floor(t / 60) % 24;
  const m = t % 60;
  const ap = h >= 12 ? 'م' : 'ص';
  const displayH = h % 12 === 0 ? 12 : h % 12;
  return `${displayH}:${m === 0 ? '00' : m} ${ap}`;
}
function wizBuildSession(startTime) {
  const items = [];
  let curr = startTime;
  const cut = CUTS.find(c => c.id === S.bookCut);
  if (cut) {
    items.push({ name: cut.n, start: curr, end: curr + cut.dur, isBreak: false, emp: S.bookEmployee || 'أبو الوفا' });
    curr += cut.dur;
  }
  const exs = [...S.bookExtras].map(id => EXTRAS.find(e => e.id === id));
  exs.forEach((e, idx) => {
    items.push({ name: 'استراحة وراحة للعميل والموظف', start: curr, end: curr + 15, isBreak: true });
    curr += 15;
    items.push({ name: e.n, start: curr, end: curr + 20, isBreak: false, emp: EMPLOYEES[idx % EMPLOYEES.length].n });
    curr += 20;
  });
  return { items, end: curr };
}

/* ===== النسخة النهائية لحجز الموبايل: نفس تفاصيل الموقع داخل تجربة تطبيق ===== */
function bSvc(id){return B_SERVICES.find(s=>s.id===id)}
function bCat(id){return B_CATS.find(c=>c.id===id)}
function bBranch(){return B_BRANCHES.find(b=>b.id===S.bookBranch)}
function bSelSvcs(){return [...S.bookServices].map(bSvc).filter(Boolean)}
function bSelCats(){return B_CATS.filter(c=>bSelSvcs().some(s=>s.cat===c.id))}
function bBestEmp(cat){return B_EMPLOYEES[cat].slice().sort((a,b)=>b.r-a.r)[0]}
function bSubTotal(){return bSelSvcs().reduce((a,s)=>a+s.price,0)+[...S.bookUpsell].map(id=>B_UPSELL.find(u=>u.id===id)).filter(Boolean).reduce((a,u)=>a+u.price,0)}
function bTotalDur(){const n=bSelSvcs().length;return bSelSvcs().reduce((a,s)=>a+s.dur,0)+15*Math.max(0,n-1)}
function bFmtDur(min){const h=Math.floor(min/60),m=min%60;if(!h)return m+' دقيقة';return (h===1?'ساعة':h===2?'ساعتان':h+' ساعات')+(m?' و '+m+' د':'')}
function bPriceParts(){const sub=bSubTotal(),pts=S.bookUsePoints?Math.min(50,sub):0,wal=S.bookUseWallet?Math.min(120,sub-pts):0,cpn=Math.min(S.bookCoupon,Math.max(0,sub-pts-wal));const net=Math.max(0,sub-pts-wal-cpn),vat=Math.round(net*.15);return{sub,pts,wal,cpn,vat,total:net+vat}}
function bSyncEmp(){bSelCats().forEach(c=>{if(!S.bookEmp[c.id])S.bookEmp[c.id]='any'});Object.keys(S.bookEmp).forEach(k=>{if(!bSelCats().some(c=>c.id===k))delete S.bookEmp[k]})}
function bSlotsForDay(d){const out=[],dur=bTotalDur(),open=9*60,close=23*60;for(let t=open;t+dur<=close;t+=30){out.push({t,busy:((d.getDate()*7+t/30)%9===0)})}return out}
function bBuildSession(startMin){
 const items=[];let cursor=startMin;
 bSelSvcs().forEach((s,i)=>{
  if(i>0){items.push({isBreak:true,start:cursor,end:cursor+15,dur:15});cursor+=15}
  const cat=bCat(s.cat),chosen=S.bookMode==='manual'&&S.bookEmp[s.cat]&&S.bookEmp[s.cat]!=='any'?S.bookEmp[s.cat]:bBestEmp(s.cat).n;
  items.push({isBreak:false,svc:s,cat,emp:chosen,start:cursor,end:cursor+s.dur});cursor+=s.dur;
 });
 return{items,end:cursor,emps:[...new Set(items.filter(i=>!i.isBreak).map(i=>i.emp))]};
}

      <div class="wiz-content">
        ${stepHtml}
      </div>

        ${S.giftStep > 1 ? '<button class="btn btn-line" id="giftPrevBtn" style="flex:1">السابق</button>' : ''}

          ${S.giftStep === 5 ? 'إرسال ودفع الهدية' : 'متابعة'}
        </button>
      </div>
    </div>
  `;
}

function canGiftWizNext(){
 if(S.giftDone)return true;
 if(S.giftStep===1)return!!S.giftType;
 if(S.giftStep===2)return!!S.giftBranch;
 if(S.giftStep===3)return S.giftType==='svc'?S.giftServices.size>0:!!S.giftPkg;
 if(S.giftStep===4)return !!(S.giftSender.trim()&&S.giftRecipient.trim()&&S.giftPhone.trim().length>=8&&(S.giftSchedule==='now'||S.giftDate));
 return!!S.giftPay&&S.giftTerms;
}

}

/* ================= العرض والربط ================= */
function render(){
 const scr=$('#screens');
 const appShell=document.querySelector('.app');
 let html='';
 if(S.giftWizard)html=giftWizardHTML();
 else if(S.bookWizard)html=wizardHTML();
 else if(S.tab==='home')html=S.svPage?serviceHTML():homeHTML();
 else if(S.tab==='store')html=storeHTML();
 else if(S.tab==='cart')html=cartHTML();
 else if(S.tab==='bookings')html=bookingsHTML();
 else html=accountHTML();
 if(appShell)appShell.classList.toggle('home-shell',S.tab==='home'&&!S.svPage&&!S.bookWizard&&!S.giftWizard);
 scr.innerHTML=`<div class="screen on">${html}</div>`;
 /* الشريط اللاصق */
 let bar=$('#bookbar');
 if(!bar){bar=document.createElement('div');bar.id='bookbar';bar.className='bookbar';document.body.appendChild(bar)}
 const showBar=S.tab==='home'&&S.svPage&&S.svSel&&!S.bookWizard&&!S.giftWizard;
 bar.innerHTML=showBar?bookbarHTML():'';
 bar.classList.toggle('on',!!showBar);
 bar.classList.toggle('open',!!showBar&&S.barOpen);
 $('#tabbar').style.display = (S.bookWizard || S.giftWizard) ? 'none' : 'grid';
 $$('#tabbar .tab').forEach(t=>t.classList.toggle('on',t.dataset.tab===S.tab));
 bind();
}
function go(tab){S.tab=tab;if(tab!=='home')S.svPage=false;render();scrollTo({top:0,behavior:'smooth'})}
function bind(){
 /* تنقل عام للخطوات الحرة */
 if (S.giftWizard) {
   const cancel = $('#giftCancelBtn');
   if (cancel) cancel.addEventListener('click', () => { S.giftWizard = false; S.giftStep = 1; S.giftDone=false; render(); });
   const doneHome=$('#giftDoneHome');
   if(doneHome)doneHome.addEventListener('click',()=>{S.giftWizard=false;S.giftDone=false;S.giftStep=1;S.tab='home';render();scrollTo({top:0,behavior:'smooth'})});
   const openRecipient=$('#giftOpenRecipient');
   if(openRecipient)openRecipient.addEventListener('click',()=>{location.href=recipientURL()});
   const shareRecipient=$('#giftShareRecipient');
   if(shareRecipient)shareRecipient.addEventListener('click',()=>{
    const txt='هدية من عناية سامي — '+recipientURL();
    if(navigator.share)navigator.share({title:'عناية سامي',text:txt}).catch(()=>{});
    else{navigator.clipboard&&navigator.clipboard.writeText(txt);toast('تم نسخ رابط الهدية')}
   });
   const again=$('#giftAgain');
   if(again)again.addEventListener('click',()=>{
    S.giftDone=false;S.giftStep=1;S.giftType='pkg';S.giftBranch=null;S.giftPkg=null;S.giftServices.clear();
    S.giftSender='';S.giftRecipient='';S.giftPhone='';S.giftMsg='';S.giftPay=null;S.giftTerms=false;S.giftCoupon=0;S.giftCouponCode='';
    render();scrollTo({top:0,behavior:'smooth'});
   });
   
   const prev = $('#giftPrevBtn');
   if (prev) prev.addEventListener('click', () => { S.giftStep--; render(); });
   
   const next = $('#giftNextBtn');
   if (next) next.addEventListener('click', () => {
     if (S.giftStep === 5) {
       S.giftRef='#GIFT-'+String(Math.floor(202600+Math.random()*9000));
       S.giftDone=true;
       render();
       toast('تم إرسال بطاقة الإهداء والدفع بنجاح');
     } else {
       S.giftStep++;
       render();
     }
   });

   $$('[data-g-type]').forEach(el=>el.addEventListener('click',()=>{
    S.giftType=el.dataset.gType;S.giftPkg=null;S.giftServices.clear();render();
   }));
   $$('[data-g-branch]').forEach(el=>el.addEventListener('click',()=>{S.giftBranch=el.dataset.gBranch;render()}));
   $$('[data-g-pkg]').forEach(el=>el.addEventListener('click',()=>{S.giftPkg=el.dataset.gPkg;render()}));
   $$('[data-g-cat]').forEach(el=>el.addEventListener('click',()=>{
    const id=el.dataset.gCat;S.giftOpenCats.has(id)?S.giftOpenCats.delete(id):S.giftOpenCats.add(id);render();
   }));
   $$('[data-g-svc]').forEach(el=>el.addEventListener('click',()=>{
    const id=el.dataset.gSvc;S.giftServices.has(id)?S.giftServices.delete(id):S.giftServices.add(id);render();
   }));
   $$('[data-g-design]').forEach(el=>el.addEventListener('click',()=>{S.giftDesign=el.dataset.gDesign;render()}));
   $$('[data-g-method]').forEach(el=>el.addEventListener('click',()=>{S.giftMethod=el.dataset.gMethod;render()}));
   $$('[data-g-schedule]').forEach(el=>el.addEventListener('click',()=>{S.giftSchedule=el.dataset.gSchedule;render()}));
   $$('[data-g-pay]').forEach(el=>el.addEventListener('click',()=>{S.giftPay=el.dataset.gPay;render()}));

   const sender = $('#gSender');
   if (sender) sender.addEventListener('input', () => {
     S.giftSender = sender.value;
     const nextBtn = $('#giftNextBtn');
     if (nextBtn) nextBtn.disabled = !canGiftWizNext();
   });
   
   const recipient = $('#gRecipient');
   if (recipient) recipient.addEventListener('input', () => {
     S.giftRecipient = recipient.value;
     const nextBtn = $('#giftNextBtn');
     if (nextBtn) nextBtn.disabled = !canGiftWizNext();
   });
   
   const phone = $('#gPhone');
   if (phone) phone.addEventListener('input', () => {
     S.giftPhone = phone.value;
     const nextBtn = $('#giftNextBtn');
     if (nextBtn) nextBtn.disabled = !canGiftWizNext();
   });

   const msg = $('#gMsg');
   if (msg) msg.addEventListener('input', () => {
     S.giftMsg = msg.value;
   });

   const date = $('#gDate');
   if (date) date.addEventListener('input', () => {
     S.giftDate = date.value;
     const nextBtn = $('#giftNextBtn');
     if (nextBtn) nextBtn.disabled = !canGiftWizNext();
   });
   const terms=$('#gTerms');
   if(terms)terms.addEventListener('click',()=>{S.giftTerms=!S.giftTerms;render()});
   const cpn=$('#gCoupon'),cpnBtn=$('#gCouponBtn');
   if(cpn)cpn.addEventListener('input',()=>S.giftCouponCode=cpn.value);
   if(cpnBtn)cpnBtn.addEventListener('click',()=>{
    const v=(cpn.value||'').trim().toUpperCase();
    S.giftCouponCode=v;S.giftCoupon=v==='SAMI25'?25:0;
    render();toast(v==='SAMI25'?'تم تطبيق كود الخصم':'الكود غير صالح، جرّب SAMI25');
   });

   return;
 }
 if (S.bookWizard) {
   const cancel = $('#wizCancelBtn');
   if (cancel) cancel.addEventListener('click', () => { S.bookWizard = false; S.bookStep = 1; S.bookDone=false; render(); });
   const doneHome=$('#wbDoneHome');
   if(doneHome)doneHome.addEventListener('click',()=>{S.bookWizard=false;S.bookDone=false;S.bookStep=1;S.tab='home';render();scrollTo({top:0,behavior:'smooth'})});
   
   const prev = $('#wizPrevBtn');
   if (prev) prev.addEventListener('click', () => { S.bookStep--; render(); scrollAppTop(); });
   
   const next = $('#wizNextBtn');
   if (next) next.addEventListener('click', () => {
     if (S.bookStep === 6) {
       const p=bPriceParts(),ses=bBuildSession(S.bookTime);
       const dateStr = `${W_DAYS[S.bookDate.getDay()]} ${S.bookDate.getDate()} ${W_MONTHS[S.bookDate.getMonth()]} ${S.bookDate.getFullYear()}`;
       S.bookRef = '#SA-' + String(Math.floor(260000 + Math.random() * 9000));
       
       S.bookings.unshift({
         n: bSelSvcs().map(s=>s.name).join(' + '),
         ref: S.bookRef,
         date: dateStr,
         time: fmtWizTime(S.bookTime),
         dur: bTotalDur(),
         total: p.total,
         branch: bBranch().name,
         team: ses.emps.join('، ')
       });
        if (S.bookUsePoints) S.loyaltyPoints = Math.max(0, S.loyaltyPoints - 500);
        S.loyaltyPoints += (S.bookEarnedPoints || 50);
        S.bookDone = true;
       render();
       scrollAppTop();
       toast('تم تأكيد حجزك وتثبيته بنجاح');
     } else {
       S.bookStep++;
       render();
       scrollAppTop();
     }
   });

   const pickBranchBtn=$('#wizPickBranch');
   if(pickBranchBtn)pickBranchBtn.addEventListener('click',()=>openBranchSheet('booking'));

   $$('[data-w-cat]').forEach(el => el.addEventListener('click', () => {
     const id=el.dataset.wCat;
     S.bookOpenCats.has(id)?S.bookOpenCats.delete(id):S.bookOpenCats.add(id);
     render();
   }));
   $$('[data-w-svc]').forEach(el => el.addEventListener('click', () => {
     const id=el.dataset.wSvc;
     S.bookServices.has(id)?S.bookServices.delete(id):S.bookServices.add(id);
     bSyncEmp();
     S.bookTime=null;
     render();
   }));
   $$('[data-w-mode]').forEach(el => el.addEventListener('click', () => {
     S.bookMode=el.dataset.wMode;
     if(S.bookMode==='auto')Object.keys(S.bookEmp).forEach(k=>delete S.bookEmp[k]);
     else bSyncEmp();
     render();
   }));
   $$('[data-w-emp-name]').forEach(el => el.addEventListener('click', () => {
     S.bookEmp[el.dataset.wEmpCat]=el.dataset.wEmpName;
     S.bookTime=null;
     render();
   }));

   $$('[data-w-day]').forEach(el => el.addEventListener('click', () => {
     S.bookDate=new Date(2026,6,+el.dataset.wDay);
     S.bookTime=null;
     render();
   }));
   $$('[data-w-period]').forEach(el => el.addEventListener('click', () => {
     S.bookPeriod=el.dataset.wPeriod;
     S.bookTime=null;
     render();
   }));
   $$('[data-w-slot]').forEach(el => el.addEventListener('click', () => {
      S.bookTime = parseInt(el.dataset.wSlot);
      const h = S.bookTime / 60;
      let earned = 50;
      const idx = [...el.parentNode.children].indexOf(el);
      if (h < 12) earned += 50;
      else if (idx === 3 || idx === 4) earned += 40;
      S.bookEarnedPoints = earned;
     render();
   }));
   const quick=$('[data-w-quick]');
   if(quick)quick.addEventListener('click',()=>{S.bookTime=+quick.dataset.wQuick;render()});
   $$('[data-w-up]').forEach(el=>el.addEventListener('click',()=>{
     const id=el.dataset.wUp;
     S.bookUpsell.has(id)?S.bookUpsell.delete(id):S.bookUpsell.add(id);
     render();
   }));
   [['#wbName','name'],['#wbPhone','phone'],['#wbMail','mail']].forEach(([sel,k])=>{
     const el=$(sel);if(el)el.addEventListener('input',()=>{S.bookCust[k]=el.value;const nb=$('#wizNextBtn');if(nb)nb.disabled=!canWizNext()});
   });
   const notes=$('#wbNotes');if(notes)notes.addEventListener('input',()=>S.bookNotes=notes.value);
   const pts=$('#wbPoints');if(pts)pts.addEventListener('click',()=>{S.bookUsePoints=!S.bookUsePoints;render()});
   const wal=$('#wbWallet');if(wal)wal.addEventListener('click',()=>{S.bookUseWallet=!S.bookUseWallet;render()});
   const cpn=$('#wbCoupon'),cpnBtn=$('#wbCouponBtn');
   if(cpn)cpn.addEventListener('input',()=>S.bookCouponCode=cpn.value);
   if(cpnBtn)cpnBtn.addEventListener('click',()=>{const v=(cpn.value||'').trim().toUpperCase();S.bookCouponCode=v;S.bookCoupon=v==='SAMI25'?25:0;render();toast(v==='SAMI25'?'تم تطبيق كود الخصم':'الكود غير صالح، جرّب SAMI25')});
   $$('[data-w-pay]').forEach(el => el.addEventListener('click', () => {
     S.bookPay = el.dataset.wPay;
     render();
   }));

   return; // Stop bind execution for free flow tabs when wizard is active
 }
 /* تنقل عام */
 $$('[data-go]').forEach(el=>el.addEventListener('click',e=>{
  e.stopPropagation();
  const g=el.dataset.go;
   const arp=$("#appRedeemPoints");if(arp)arp.addEventListener("click",openLoyaltySheet);
   const apl=$("#appPointsLog");if(apl)apl.addEventListener("click",openLoyaltySheet);
   if(g==="loyalty"){openLoyaltySheet();return}
   if(g==='services'){S.tab='home';S.svPage=true;render();scrollTo({top:0,behavior:'smooth'})}
  else if(g==='book'){
   S.bookWizard=true;S.bookDone=false;S.bookStep=1;
   render();scrollTo({top:0,behavior:'smooth'});
   setTimeout(()=>openBranchSheet('booking'),80);
  }
  else if(g==='gift'){
   S.giftWizard=true;S.giftDone=false;S.giftStep=1;
   S.giftType='pkg';S.giftBranch=null;S.giftPkg=null;S.giftServices.clear();S.giftOpenCats=new Set(['hair']);
   S.giftPay=null;S.giftTerms=false;S.giftCoupon=0;S.giftCouponCode='';
   render();scrollTo({top:0,behavior:'smooth'})
  }
  else if(g==='offers'){const o=$('#offerTrack');if(o)o.scrollIntoView({behavior:'smooth',block:'center'})}
  else go(g);
 }));
 $$('[data-go-url]').forEach(el=>el.addEventListener('click',()=>{location.href=el.dataset.goUrl}));
 $$('[data-store-cat]').forEach(el=>el.addEventListener('click',e=>{
  e.stopPropagation();
  S.storeCat=el.dataset.storeCat;
  render();
  requestAnimationFrame(()=>$('.store-cats')?.scrollIntoView({behavior:'smooth',block:'nearest'}));
 }));
 /* مفضلة وإضافة للسلة */
 $$('[data-fav]').forEach(el=>el.addEventListener('click',e=>{
  e.stopPropagation();
  const id=el.dataset.fav;
  S.favs.has(id)?S.favs.delete(id):S.favs.add(id);
  el.classList.toggle('on',S.favs.has(id));
 }));
 $$('[data-add]').forEach(el=>el.addEventListener('click',e=>{
  e.stopPropagation();
  toggleAppCart(el.dataset.add);
 }));
 $$('[data-product]').forEach(el=>el.addEventListener('click',()=>openProductSheet(el.dataset.product)));
 if(S.tab==='home'&&!S.svPage){
  /* هيرو: مزامنة النقاط + تشغيل تلقائي */
  const tr=$('#heroTrack'),dots=$$('#heroDots i');
  if(tr){
   tr.addEventListener('scroll',()=>{
    const i=Math.round(Math.abs(tr.scrollLeft)/tr.clientWidth);
    if(i!==S.heroI){S.heroI=i;dots.forEach((d,j)=>d.classList.toggle('on',j===i))}
   },{passive:true});
   clearInterval(S._heroT);
   S._heroT=setInterval(()=>{
    if(S.tab!=='home'||S.svPage)return;
    const n=(S.heroI+1)%HERO.length;
    tr.scrollTo({left:-n*tr.clientWidth,behavior:'smooth'});
   },4000);
  }
  /* العروض: تشغيل تلقائي */
  const ot=$('#offerTrack');
  if(ot){
   const w=()=>ot.querySelector('.offer').offsetWidth+12;
   ot.addEventListener('scroll',()=>{S.offerI=Math.round(Math.abs(ot.scrollLeft)/w())},{passive:true});
   clearInterval(S._offT);
   S._offT=setInterval(()=>{
    if(S.tab!=='home'||S.svPage)return;
    S.offerI=(S.offerI+1)%OFFERS.length;
    ot.scrollTo({left:-S.offerI*w(),behavior:'smooth'});
   },2800);
  }
  /* الآراء: مزامنة النقاط */
  const tt=$('#tstTrack'),td=$$('#tstDots i');
  if(tt)tt.addEventListener('scroll',()=>{
   const w=tt.querySelector('.tst').offsetWidth+12;
   const i=Math.min(TSTS.length-1,Math.round(Math.abs(tt.scrollLeft)/w));
   if(i!==S.tstI){S.tstI=i;td.forEach((d,j)=>d.classList.toggle('on',j===i))}
  },{passive:true});
  /* بطاقات الخدمات ← تفاصيل الخدمة */
  $$('.svc-card').forEach(el=>el.addEventListener('click',()=>{
   openServiceSheet(el.dataset.svc);
  }));
  /* الكوفي والمشاركة والعجلة */
  const cf=$('#coffeeBar');if(cf)cf.addEventListener('click',()=>toast('كوفي شوب عناية سامي بانتظارك في الفرع ☕'));
  const sh=$('#shareBtn');if(sh)sh.addEventListener('click',()=>{
   const txt='حمّل تطبيق عناية سامي واحجز بأول خصم! رابط الإحالة: samicare.sa/r/M7MD';
   if(navigator.share)navigator.share({title:'عناية سامي',text:txt}).catch(()=>{});
   else{navigator.clipboard&&navigator.clipboard.writeText(txt);toast('تم نسخ رابط الإحالة — شاركه مع أصدقائك')}
  });
  const sp=$('#spinBtn');
  if(sp)sp.addEventListener('click',()=>{
   if(S.spinning)return;
   S.spinning=true;sp.disabled=true;
   const win=Math.floor(Math.random()*WHEEL.length);
   const seg=360/WHEEL.length;
   S.wheelDeg+=5*360+(360-(win*seg+seg/2))-(S.wheelDeg%360);
   $('#wheelSvg').style.transform=`rotate(${S.wheelDeg}deg)`;
   setTimeout(()=>{
    S.spinning=false;sp.disabled=false;
     const prize = WHEEL[win].n;
     if (prize.includes("نقطة")) {
       const pts = parseInt(prize) || 50;
       S.loyaltyPoints += pts;
     }
     toast("مبروك! ربحت: "+prize+" 🎉",'<path d="M12 2l2.2 4.9 5.3.6-4 3.7 1.1 5.3L12 13.9 7.4 16.5l1.1-5.3-4-3.7 5.3-.6z"/>');
     render();

   },3700);
  });
 }
 if(S.tab==='home'&&S.svPage){
  $('#svBack').addEventListener('click',()=>{S.svPage=false;render();scrollTo({top:0})});
  $$('[data-flt]').forEach(el=>el.addEventListener('click',()=>{S.svFlt=el.dataset.flt;render()}));
  $$('[data-cut]').forEach(el=>el.addEventListener('click',()=>{
   S.svSel=S.svSel===el.dataset.cut?null:el.dataset.cut;
   if(!S.svSel)S.barOpen=false;
   render();
  }));
  $$('[data-ext]').forEach(el=>el.addEventListener('click',()=>{
   const id=el.dataset.ext;
   S.svExtras.has(id)?S.svExtras.delete(id):S.svExtras.add(id);
   render();
  }));
  $$('.faq-i .q').forEach(q=>q.addEventListener('click',()=>q.parentElement.classList.toggle('open')));
 }
 /* الشريط اللاصق */
 const chev=$('#bbChev');
 if(chev)chev.addEventListener('click',()=>{S.barOpen=!S.barOpen;$('#bookbar').classList.toggle('open',S.barOpen)});
 const bbGo=$('#bbGo');
 if(bbGo)bbGo.addEventListener('click',()=>{
  const c=CUTS.find(x=>x.id===S.svSel);
  const map={vip:'s4',classic:'s1',beard:'s2',kids:'s1'};
 S.bookWizard=true;S.bookDone=false;S.bookStep=1;
  S.bookServices=new Set(map[c.id]?[map[c.id]]:[]);
  S.bookOpenCats=new Set(['hair']);
  S.bookMode=null;S.bookEmp={};S.bookDate=null;S.bookTime=null;S.bookPay=null;
  S.svSel=null;S.svExtras.clear();S.barOpen=false;S.svPage=false;
  bSyncEmp();
  render();scrollTo({top:0,behavior:'smooth'});
  setTimeout(()=>openBranchSheet('booking'),80);
 });
 if(S.tab==='cart'){
  $$('[data-inc]').forEach(b=>b.addEventListener('click',()=>{S.cart.set(b.dataset.inc,S.cart.get(b.dataset.inc)+1);refreshBadge();render()}));
  $$('[data-dec]').forEach(b=>b.addEventListener('click',()=>{
   const id=b.dataset.dec,q=S.cart.get(id);
   q<=1?S.cart.delete(id):S.cart.set(id,q-1);refreshBadge();render();
  }));
  $$('[data-del]').forEach(b=>b.addEventListener('click',()=>{S.cart.delete(b.dataset.del);refreshBadge();render()}));
  const co=$('#checkoutBtn');
  if(co)co.addEventListener('click',()=>{
   const total=cartTotal()+Math.round(cartTotal()*.15);
   S.cart.clear();refreshBadge();render();
   toast('تم تأكيد طلبك بنجاح — الإجمالي '+rs(total)+' ر.س 🎉');
  });
 }
}
$$('#tabbar .tab').forEach(t=>t.addEventListener('click',()=>go(t.dataset.tab)));
$('#bellBtn').addEventListener('click',()=>toast('لديك إشعاران جديدان 🔔'));
$('#locBtn').addEventListener('click',()=>openBranchSheet('header'));
syncBranchHeader();
render();
})();
</script>
</body>

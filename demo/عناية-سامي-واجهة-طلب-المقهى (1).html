<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>مقهى عناية سامي | اطلب من طاولتك</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#CE9234; --gold-b:#E8BE6C; --gold-d:#9C6B1F; --gold-soft:rgba(206,146,52,.08);
  --ink:#221F1F; --mute:#8A7B6C; --soft:#B3A594;
  --bg:#FDFCF7; --card:#FFFFFF; --line:rgba(206,146,52,.12); --green:#1F9D57;
  --ease:cubic-bezier(.33,.9,.35,1); --spring:cubic-bezier(.2,.9,.3,1.12); --dur:.25s;
  --fd:'Alexandria',sans-serif; --fb:'IBM Plex Sans Arabic',sans-serif;
  --shadow:0 8px 24px rgba(140,110,80,.05);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--fb);background:#F3EFE9;color:var(--ink);-webkit-font-smoothing:antialiased}
img{max-width:100%;display:block}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;transition:all var(--dur) var(--ease)}
::selection{background:var(--gold);color:#fff}
.app{max-width:460px;margin-inline:auto;min-height:100dvh;background:var(--bg);position:relative;overflow:hidden;padding-bottom:100px;box-shadow:0 0 40px rgba(60,40,20,.12);border-left:1px solid rgba(140,110,80,.1);border-right:1px solid rgba(140,110,80,.1)}
.chero{position:relative;padding:26px 20px 32px;color:#F3E7D0;overflow:hidden;background:radial-gradient(350px 220px at 78% 10%,rgba(206,146,52,.35),transparent 65%),linear-gradient(160deg,#241B10,#14100A)}
.chero .top{display:flex;align-items:center;gap:12px}
.chero .lg{height:46px;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.2))}
.chero .top b{font-family:var(--fd);font-size:16px;color:#F3E7D0;display:block;letter-spacing:0.5px}
.chero .top small{font-size:8.5px;letter-spacing:.28em;color:var(--gold-b)}
.chero .tbadge{margin-inline-start:auto;display:flex;gap:7px;align-items:center;font-size:12px;font-weight:800;background:rgba(206,146,52,.14);border:1px solid rgba(206,146,52,.35);border-radius:999px;padding:8px 16px;color:var(--gold-b);backdrop-filter:blur(4px)}
.chero h1{font-family:var(--fd);font-size:25px;font-weight:800;margin-top:20px;letter-spacing:-0.5px}
.chero p{font-size:13px;color:#CBBB9E;margin-top:6px;opacity:0.9}
.tabs{position:sticky;top:0;z-index:20;background:rgba(253,252,247,.96);backdrop-filter:blur(15px);border-bottom:1px solid rgba(206,146,52,.08);display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:14px 16px;box-shadow:0 4px 20px rgba(140,110,80,.02)}
.tabs::-webkit-scrollbar{display:none}
.ctab{flex:none;display:flex;gap:7px;align-items:center;font-size:12.5px;font-weight:700;color:var(--mute);background:#fff;border:1px solid rgba(140,110,80,.12);border-radius:999px;padding:10px 18px;min-height:42px;box-shadow:0 2px 6px rgba(0,0,0,.02)}
.ctab.on{background:var(--ink);color:#fff;border-color:var(--ink);box-shadow:0 4px 12px rgba(34,31,31,.15)}
.ctab.on .cn{color:var(--gold-b);opacity:1}
.ctab .cn{font-size:10px;opacity:.7;background:rgba(140,110,80,.08);padding:1px 6px;border-radius:8px}
.ctab.on .cn{background:rgba(255,255,255,.1)}
.sec-t{font-family:var(--fd);font-size:16.5px;font-weight:800;padding:22px 18px 12px;display:flex;gap:9px;align-items:center;color:var(--ink)}
.sec-t::before{content:"";width:16px;height:3px;border-radius:2px;background:var(--gold);display:inline-block}
.dlist{padding:0 16px;display:grid;gap:14px}
.dcard{display:flex;gap:14px;background:#fff;border:1px solid rgba(206,146,52,.1);border-radius:22px;padding:12px;transition:all var(--dur) var(--ease);box-shadow:var(--shadow);animation:fadeUp .4s var(--ease) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.dcard:hover{transform:translateY(-2px);border-color:var(--gold-b);box-shadow:0 12px 30px rgba(206,146,52,.08)}
.dcard.inq{border-color:var(--gold);background:#FFFDF9;box-shadow:0 10px 24px -12px rgba(206,146,52,.18)}
.dcard .di{flex:none;width:90px;height:90px;border-radius:16px;overflow:hidden;background:linear-gradient(150deg,#FAF8F5,#EFEAE1);position:relative;box-shadow:inset 0 0 10px rgba(0,0,0,.03)}
.dcard .di img{width:100%;height:100%;object-fit:cover;transition:transform 0.5s var(--ease)}
.dcard:hover .di img{transform:scale(1.06)}
.dcard .db{flex:1;display:flex;flex-direction:column;min-width:0;justify-content:space-between}
.dcard h4{font-family:var(--fd);font-size:14.5px;font-weight:700;color:var(--ink)}
.dcard p{font-size:11.5px;color:var(--mute);line-height:1.6;margin:4px 0 8px;flex:1}
.dcard .drow{display:flex;align-items:center;gap:10px}
.dcard .pr{font-family:var(--fd);font-size:18px;font-weight:800;color:var(--gold-d)}
.dcard .pr small{font-size:10px;color:var(--mute);font-weight:400}
.addb{margin-inline-start:auto;width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--gold-b),var(--gold));color:#fff;display:grid;place-items:center;box-shadow:0 6px 16px -4px rgba(206,146,52,.45);transition:all var(--dur) var(--spring)}
.addb:hover{transform:scale(1.08);box-shadow:0 8px 20px -4px rgba(206,146,52,.6)}
.addb:active{transform:scale(.92)}
.qtyc{margin-inline-start:auto;display:flex;align-items:center;gap:3px;border:1px solid var(--gold);border-radius:12px;overflow:hidden;direction:ltr;background:#fff;box-shadow:0 2px 6px rgba(206,146,52,.08)}
.qtyc button{width:32px;height:34px;display:grid;place-items:center;color:var(--gold-d);font-weight:800;font-size:16px;transition:background 0.2s}
.qtyc button:active{background:var(--gold-soft)}
.qtyc span{min-width:24px;text-align:center;font-family:var(--fd);font-weight:800;font-size:14px;color:var(--ink)}
.soldout{position:absolute;inset:0;background:rgba(255,255,255,.8);backdrop-filter:blur(1px);display:grid;place-items:center;font-size:10.5px;font-weight:800;color:var(--mute)}
.cartbar{position:fixed;bottom:16px;right:50%;transform:translate(50%,140%);width:min(420px,92%);z-index:60;transition:transform .4s var(--spring)}
.cartbar.on{transform:translate(50%,0)}
.cartbar .inner{background:rgba(34,31,31,.97);backdrop-filter:blur(10px);color:#fff;border-radius:24px;padding:10px 12px;display:flex;align-items:center;gap:12px;box-shadow:0 12px 30px rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.08)}
.cartbar .cc{position:relative;width:40px;height:40px;border-radius:12px;background:rgba(206,146,52,.15);color:var(--gold-b);display:grid;place-items:center;flex:none}
.cartbar .cc .n{position:absolute;top:-6px;left:-6px;min-width:18px;height:18px;border-radius:9px;background:var(--gold);color:#fff;font-size:10.5px;font-weight:800;display:grid;place-items:center;padding-inline:4px;box-shadow:0 2px 6px rgba(206,146,52,.4)}
.cartbar .ci b{font-family:var(--fd);font-size:12.5px;display:block}
.cartbar .ci small{font-size:10px;color:#C9BCA7}
.cartbar .cpr{margin-inline-start:auto;font-family:var(--fd);font-size:17px;font-weight:800;color:var(--gold-b)}
.cartbar .go{background:linear-gradient(135deg,var(--gold-b),var(--gold));color:#fff;min-height:42px;padding:8px 18px;border-radius:14px;font-size:12.5px;font-weight:800;display:flex;gap:6px;align-items:center;box-shadow:0 4px 12px rgba(206,146,52,.3)}
.cartbar .go:active{transform:scale(.96)}
.ov{position:fixed;inset:0;z-index:80;background:rgba(20,13,6,.45);backdrop-filter:blur(5px);opacity:0;pointer-events:none;transition:opacity .3s}
.ov.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;bottom:0;right:50%;transform:translate(50%,105%);z-index:81;width:min(460px,100%);background:#fff;border-radius:28px 28px 0 0;max-height:86dvh;display:flex;flex-direction:column;transition:transform .4s var(--spring);box-shadow:0 -10px 40px rgba(0,0,0,0.15)}
.sheet.on{transform:translate(50%,0)}
.sheet .sh{padding:18px 20px;border-bottom:1px solid rgba(206,146,52,.1);display:flex;align-items:center;justify-content:space-between}
.sheet .sh b{font-family:var(--fd);font-size:16px;font-weight:800;color:var(--ink)}
.sheet .sx{width:36px;height:36px;border-radius:12px;border:1px solid rgba(140,110,80,.15);display:grid;place-items:center;color:var(--mute)}
.sheet .sx:active{background:rgba(140,110,80,.05)}
.sheet .sb{overflow-y:auto;padding:16px 20px;flex:1}
.qitem{display:flex;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid rgba(140,110,80,.08)}
.qitem img{width:56px;height:56px;border-radius:12px;object-fit:cover;flex:none;background:#FAF8F5}
.qitem .qi2{flex:1;min-width:0}
.qitem .qi2 b{font-family:var(--fd);font-size:13px;display:block;color:var(--ink)}
.qitem .qi2 .p{font-size:12px;color:var(--gold-d);font-weight:800;margin-top:2px}
.qitem .qtyc{margin:0}
.sheet .sf{border-top:1px solid rgba(206,146,52,.1);padding:18px 20px;background:#FCFAF7}
.sheet .srow{display:flex;justify-content:space-between;font-size:12.5px;color:#4E4436;padding:4px 0}
.sheet .srow.t{font-weight:800;color:var(--ink);font-size:14px;border-top:1px dashed rgba(206,146,52,.2);margin-top:8px;padding-top:12px}
.sheet .srow.t b{font-family:var(--fd);font-size:19px;color:var(--gold-d)}
.note-in{width:100%;border:1px solid rgba(140,110,80,.15);border-radius:12px;padding:11px 14px;font-family:inherit;font-size:12.5px;background:#fff;outline:none;resize:none;min-height:56px;margin:12px 0 6px;transition:border-color 0.2s}
.note-in:focus{border-color:var(--gold)}
.btn-g{background:linear-gradient(135deg,var(--gold-b),var(--gold));color:#fff;width:100%;min-height:48px;border-radius:14px;font-size:13.5px;font-weight:800;display:flex;gap:8px;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(206,146,52,.35)}
.btn-g:active{transform:scale(.98)}
.done{padding:48px 24px;text-align:center}
.done .big{width:88px;height:88px;margin:0 auto 20px;border-radius:50%;background:linear-gradient(135deg,var(--gold-b),var(--gold));display:grid;place-items:center;color:#fff;box-shadow:0 16px 36px rgba(206,146,52,.35);animation:pop .5s var(--spring) both}
@keyframes pop{from{transform:scale(.5)}to{transform:scale(1)}}
.done .big svg{stroke-dasharray:60;stroke-dashoffset:60;animation:dash .6s var(--ease) forwards .35s}
@keyframes dash{to{stroke-dashoffset:0}}
.done h1{font-family:var(--fd);font-size:22px;font-weight:800;color:var(--ink)}
.done p{font-size:13px;color:var(--mute);margin-top:8px;line-height:1.8}
.done .rf{display:inline-block;margin-top:16px;font-family:var(--fd);font-weight:800;color:var(--gold-d);background:var(--gold-soft);border:1px solid rgba(206,146,52,.2);border-radius:12px;padding:10px 20px;box-shadow:inset 0 1px 4px rgba(206,146,52,.05)}
.status-track{margin:10px 16px 0;background:#fff;border:1px solid rgba(206,146,52,.08);border-radius:20px;padding:20px;box-shadow:var(--shadow)}
.stp2{display:flex;gap:12px;align-items:center;padding:10px 0}
.stp2 .d{width:32px;height:32px;border-radius:50%;border:2px solid rgba(140,110,80,.15);display:grid;place-items:center;color:var(--soft);flex:none;transition:.3s;font-weight:700;font-size:12px}
.stp2.on .d{border-color:var(--green);background:var(--green);color:#fff}
.stp2 b{font-size:13px;font-family:var(--fd);color:var(--mute)}
.stp2 small{font-size:11px;color:var(--mute);display:block;opacity:0.8}
.stp2.on b{color:var(--ink)}
.toast{position:fixed;bottom:80px;right:50%;transform:translate(50%,16px);z-index:200;opacity:0;pointer-events:none;background:rgba(34,31,31,.98);backdrop-filter:blur(8px);color:#fff;padding:10px 18px;border-radius:16px;font-size:12.5px;font-weight:600;display:flex;gap:10px;align-items:center;transition:all .35s var(--ease);box-shadow:0 8px 24px rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.08);width:calc(100% - 32px);max-width:380px;justify-content:space-between}
.toast.on{opacity:1;transform:translate(50%,0);pointer-events:auto}
.toast .tcontent{display:flex;align-items:center;gap:8px}
.toast .ti{width:22px;height:22px;border-radius:50%;background:var(--gold);display:grid;place-items:center;flex:none;color:#fff}
.toast .tundo{background:none;border:none;color:var(--gold-b);font-weight:800;font-size:12px;cursor:pointer;padding:6px 10px;border-radius:8px;background:rgba(255,255,255,0.1);transition:background 0.2s}
.toast .tundo:active{background:rgba(255,255,255,0.2)}
.empty2{padding:50px 24px;text-align:center;color:var(--mute);font-size:12.5px}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="cartbar" id="cartbar"><div class="inner">
  <span class="cc"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0"/></svg><span class="n" id="cartN">0</span></span>
  <span class="ci"><b id="cartCount">0 أصناف</b><small>اطلب من طاولتك مباشرة</small></span>
  <span class="cpr" id="cartPr">0 ر.س</span>
  <button class="go" id="openCart">عرض السلة <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 6l-6 6 6 6"/></svg></button>
</div></div>
<div class="ov" id="ov"></div>
<div class="sheet" id="sheet"></div>
<div class="toast" id="toast"></div>

 hot:'https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=500&q=80',
 latte:'https://images.unsplash.com/photo-1541167760496-1628856ab772?w=500&q=80',
 cold:'https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=500&q=80',
 juice:'https://images.unsplash.com/photo-1600271886742-f049cd451bba?w=500&q=80',
 tea:'https://images.unsplash.com/photo-1576092768241-dec231879fc3?w=500&q=80',
 esp:'https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?w=500&q=80',
 moc:'https://images.unsplash.com/photo-1578374173705-969cbe6f2d6b?w=500&q=80',
};
const SEED={
 cats:[
  {id:'c1',n:'المشروبات الساخنة',desc:'قهوة وإسبريسو ومشروبات دافئة',on:true},
  {id:'c2',n:'المشروبات الباردة',desc:'آيس كوفي ومشروبات منعشة',on:true},
  {id:'c3',n:'العصائر الطازجة',desc:'عصائر طبيعية 100%',on:true},
  {id:'c4',n:'الشاي والأعشاب',desc:'تشكيلة شاي فاخرة',on:true},
  {id:'c5',n:'الحلويات',desc:'حلويات ومعجنات طازجة',on:false},
 ],
 drinks:[
  {id:'d1',cat:'c1',n:'قهوة عناية سامي',desc:'خلطتنا الخاصة بنكهة غنية',pr:18,img:IMG.hot,on:true},
  {id:'d2',cat:'c1',n:'لاتيه',desc:'إسبريسو مع حليب مخفوق ناعم',pr:20,img:IMG.latte,on:true},
  {id:'d3',cat:'c1',n:'كابتشينو',desc:'رغوة كثيفة ونكهة متوازنة',pr:19,img:IMG.esp,on:true},
  {id:'d4',cat:'c1',n:'موكا',desc:'قهوة بالشوكولاتة الفاخرة',pr:22,img:IMG.moc,on:true},
  {id:'d5',cat:'c2',n:'آيس لاتيه',desc:'لاتيه بارد منعش بالثلج',pr:22,img:IMG.cold,on:true},
  {id:'d6',cat:'c2',n:'آيس أمريكانو',desc:'إسبريسو بارد مع ماء وثلج',pr:20,img:IMG.cold,on:true},
  {id:'d7',cat:'c3',n:'عصير برتقال طازج',desc:'برتقال معصور طازجًا',pr:16,img:IMG.juice,on:true},
  {id:'d8',cat:'c3',n:'عصير مانجو',desc:'مانجو طبيعي كامل',pr:18,img:IMG.juice,on:false},
  {id:'d9',cat:'c4',n:'شاي أخضر',desc:'شاي أخضر بالنعناع',pr:14,img:IMG.tea,on:true},
  {id:'d10',cat:'c4',n:'شاي كرك',desc:'كرك بالهيل على الطريقة الأصيلة',pr:12,img:IMG.tea,on:true},
 ],
 tables:[{id:'t1',n:1,seats:2,on:true},{id:'t2',n:2,seats:4,on:true},{id:'t3',n:3,seats:4,on:true},{id:'t4',n:5,seats:6,on:true}],
 orders:[],seq:2073,
};
function load(){try{const r=JSON.parse(localStorage.getItem(KEY));if(r&&r.cats)return r}catch(e){}return JSON.parse(JSON.stringify(SEED))}
function save(db){try{localStorage.setItem(KEY,JSON.stringify(db))}catch(e){}}
let DB=load();
/* رقم الطاولة من رابط QR: ?table=N */
const params=new URLSearchParams(location.search);
const TABLE=parseInt(params.get('table'))||1;
/* الحالة */
const S={page:'menu',tab:DB.cats.find(c=>c.on)?DB.cats.find(c=>c.on).id:null,cart:{},notes:'',ref:null,orderId:null};
const $=q=>document.querySelector(q);
const $$=q=>[...document.querySelectorAll(q)];
const rs=n=>n.toLocaleString('ar-EG-u-nu-latn');
const svg=(p,w)=>`<svg width="${w||16}" height="${w||16}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">${p}</svg>`;
const drinkOf=id=>DB.drinks.find(d=>d.id===id);
const cartCount=()=>Object.values(S.cart).reduce((a,q)=>a+q,0);
const cartTotal=()=>Object.entries(S.cart).reduce((a,[id,q])=>a+(drinkOf(id)?drinkOf(id).pr*q:0),0);
function toast(m, undoId = null){
  const t=$('#toast');
  let undoHtml = '';
  if(undoId){
    undoHtml = `<button class="tundo" data-undo="${undoId}">تراجع</button>`;
  }
  t.innerHTML=`<div class="tcontent"><span class="ti">${svg('<path d="M20 6L9 17l-5-5"/>',11)}</span><span>${m}</span></div>${undoHtml}`;
  t.classList.add('on');
  clearTimeout(t._h);
  
  if(undoId){
    const btn = t.querySelector('.tundo');
    if(btn){
      btn.onclick = (e) => {
        e.stopPropagation();
        if(S.cart[undoId]){
          S.cart[undoId]--;
          if(S.cart[undoId]<=0) delete S.cart[undoId];
          render();
          toast('تم التراجع عن الإضافة');
        }
      };
    }
    t._h=setTimeout(()=>t.classList.remove('on'),3500);
  } else {
    t._h=setTimeout(()=>t.classList.remove('on'),2000);
  }
}
/* ================= العرض ================= */
function render(){
 if(S.page==='done'){renderDone();return}
 const cats=DB.cats.filter(c=>c.on);
 if(!cats.find(c=>c.id===S.tab))S.tab=cats[0]?cats[0].id:null;
 const drinks=DB.drinks.filter(d=>d.cat===S.tab);
 $('#app').innerHTML=`
 <div class="chero">
  <div class="top"><img class="lg" src="${LOGO}" alt=""><span><b>مقهى عناية سامي</b><small>SAMI CAFE</small></span>
   <span class="tbadge">${svg('<rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/>',13)} طاولة ${rs(TABLE)}</span></div>
  <h1>أهلًا بك ✨</h1><p>تصفّح القائمة واطلب مباشرة من طاولتك</p>
 </div>
 <div class="tabs">${cats.map(c=>`<button class="ctab ${S.tab===c.id?'on':''}" data-tab="${c.id}">${c.n}
   <span class="cn">${rs(DB.drinks.filter(d=>d.cat===c.id&&d.on).length)}</span></button>`).join('')}</div>
 <div class="sec-t">${cats.find(c=>c.id===S.tab)?cats.find(c=>c.id===S.tab).n:''}</div>
 <div class="dlist">${drinks.length?drinks.map((d,i)=>{
  const q=S.cart[d.id]||0;
  return`<div class="dcard ${q?'inq':''}" style="animation-delay:${i*.05}s">
   <div class="di"><img src="${d.img}" alt="${d.n}" loading="lazy" onerror="this.style.opacity=0">${!d.on?'<span class="soldout">غير متاح</span>':''}</div>
   <div class="db"><h4>${d.n}</h4><p>${d.desc}</p>
    <div class="drow"><span class="pr">${rs(d.pr)} <small>ر.س</small></span>
     ${!d.on?'':q?`<span class="qtyc"><button data-dec="${d.id}">−</button><span>${rs(q)}</span><button data-inc="${d.id}">+</button></span>`
      :`<button class="addb" data-inc="${d.id}">${svg('<path d="M12 5v14M5 12h14"/>',18)}</button>`}
    </div>
   </div>
  </div>`}).join(''):`<div class="empty2">لا توجد مشروبات متاحة في هذا القسم حاليًا</div>`}</div>
 <div style="height:20px"></div>`;
 bindMenu();
 syncCart();
}
function bindMenu(){
 $$('[data-tab]').forEach(b=>b.addEventListener('click',()=>{S.tab=b.dataset.tab;render()}));
 $$('[data-inc]').forEach(b=>b.addEventListener('click',()=>{const id=b.dataset.inc;S.cart[id]=(S.cart[id]||0)+1;render();const d=drinkOf(id);toast(`تمت إضافة ${d.n} للسلة`, id)}));
 $$('[data-dec]').forEach(b=>b.addEventListener('click',()=>{const id=b.dataset.dec;S.cart[id]=(S.cart[id]||0)-1;if(S.cart[id]<=0)delete S.cart[id];render()}));
}
function syncCart(){
 const n=cartCount();
 $('#cartbar').classList.toggle('on',n>0&&S.page==='menu');
 $('#cartN').textContent=rs(n);
 $('#cartCount').textContent=rs(n)+(n===1?' صنف':' أصناف');
 $('#cartPr').textContent=rs(cartTotal())+' ر.س';
}
/* ================= سلة الطلب ================= */
function openCart(){
 const items=Object.entries(S.cart);
 $('#sheet').innerHTML=`
  <div class="sh"><b>سلة الطلب — طاولة ${rs(TABLE)}</b><button class="sx" id="closeCart">${svg('<path d="M18 6L6 18M6 6l12 12"/>',15)}</button></div>
  <div class="sb">
   ${items.map(([id,q])=>{const d=drinkOf(id);return`
    <div class="qitem"><img src="${d.img}" alt="" onerror="this.style.opacity=0">
     <span class="qi2"><b>${d.n}</b><span class="p">${rs(d.pr)} ر.س</span></span>
     <span class="qtyc"><button data-dec="${id}">−</button><span>${rs(q)}</span><button data-inc="${id}">+</button></span>
    </div>`}).join('')}
   <textarea class="note-in" id="orderNotes" placeholder="ملاحظات على الطلب (اختياري)... مثل: قليل السكر">${S.notes}</textarea>
  </div>
  <div class="sf">
   <div class="srow"><span>عدد الأصناف</span><span>${rs(cartCount())}</span></div>
   <div class="srow t"><span>الإجمالي</span><b>${rs(cartTotal())} ر.س</b></div>
   <button class="btn-g" id="placeOrder" style="margin-top:12px">${svg('<path d="M20 6L9 17l-5-5"/>',16)} تأكيد الطلب وإرساله للمقهى</button>
  </div>`;
 $('#ov').classList.add('on');$('#sheet').classList.add('on');
 $('#closeCart').addEventListener('click',closeCart);
 $$('#sheet [data-inc]').forEach(b=>b.addEventListener('click',()=>{S.cart[b.dataset.inc]++;refreshCart()}));
 $$('#sheet [data-dec]').forEach(b=>b.addEventListener('click',()=>{const id=b.dataset.dec;S.cart[id]--;if(S.cart[id]<=0)delete S.cart[id];if(!cartCount()){closeCart()}refreshCart()}));
 $('#orderNotes').addEventListener('input',e=>S.notes=e.target.value);
 $('#placeOrder').addEventListener('click',placeOrder);
}
function refreshCart(){render();if(cartCount())openCart()}
function closeCart(){$('#ov').classList.remove('on');$('#sheet').classList.remove('on')}
/* ================= إنشاء الطلب ودفعه للداشبورد ================= */
function placeOrder(){
 if(!cartCount())return;
 DB=load(); // أحدث نسخة قبل الكتابة
 const items=Object.entries(S.cart).map(([id,q])=>{const d=drinkOf(id);return{n:d.n,q,pr:d.pr}});
 const seq=(DB.seq||2073);
 const ref='ORD-'+seq;
 const order={id:'o'+Date.now(),table:TABLE,ref,ts:Date.now(),status:'new',items,notes:S.notes};
 DB.orders.unshift(order);DB.seq=seq+1;save(DB);
 S.ref=ref;S.orderId=order.id;S.page='done';
 closeCart();$('#cartbar').classList.remove('on');
 render();
}
/* ================= صفحة النجاح + تتبع الحالة ================= */
const STLABEL={new:['تم استلام طلبك','طلبك في انتظار التأكيد من المقهى'],
 prep:['قيد التحضير','يقوم فريقنا بتحضير طلبك الآن'],
 ready:['تم التحضير','طلبك جاهز وسيصلك حالًا'],
 done:['تم التوصيل','بالهناء والشفاء ☕']};
const ORDER_STEPS=['new','prep','ready','done'];
function currentStatus(){DB=load();const o=DB.orders.find(x=>x.id===S.orderId);return o?o.status:'new'}
function renderDone(){
 const st=currentStatus();const idx=ORDER_STEPS.indexOf(st);
 const total=(()=>{const o=load().orders.find(x=>x.id===S.orderId);return o?o.items.reduce((a,i)=>a+i.pr*i.q,0):cartTotal()})();
 $('#app').innerHTML=`
  <div class="done">
   <div class="big"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M20 6L9 17l-5-5"/></svg></div>
   <h1>تم إرسال طلبك!</h1>
   <p>وصل طلبك إلى المقهى وسيبدأ التحضير قريبًا</p>
   <span class="rf">رقم الطلب: #${S.ref} • طاولة ${rs(TABLE)} • ${rs(total)} ر.س</span>
  </div>
  <div class="status-track">
   ${ORDER_STEPS.map((s,i)=>`<div class="stp2 ${i<=idx?'on':''}">
     <span class="d">${i<idx?svg('<path d="M20 6L9 17l-5-5"/>',15):i+1===idx+1&&i===idx?svg('<circle cx="12" cy="12" r="4"/>',13):rs(i+1)}</span>
     <span><b>${STLABEL[s][0]}</b><small>${STLABEL[s][1]}</small></span>
    </div>`).join('')}
  </div>
  <div style="padding:20px 16px;display:grid;gap:10px">
   <button class="btn-g" id="newOrder" style="background:#fff;border:1.5px solid var(--gold);color:var(--gold-d);box-shadow:none">
    ${svg('<path d="M12 5v14M5 12h14"/>',16)} طلب المزيد</button>
  </div>
  <p style="text-align:center;font-size:11px;color:var(--mute);padding:0 24px 10px">تتحدث حالة الطلب تلقائيًا — لا تُغلق الصفحة</p>`;
 $('#newOrder').addEventListener('click',()=>{S.cart={};S.notes='';S.page='menu';S.ref=null;S.orderId=null;render()});
}
/* ربط شريط السلة العام */
$('#openCart').addEventListener('click',openCart);
$('#ov').addEventListener('click',closeCart);
/* مزامنة تتبع الحالة من الداشبورد */
window.addEventListener('storage',e=>{if(e.key===KEY&&S.page==='done')renderDone()});
setInterval(()=>{if(S.page==='done')renderDone()},4000);
render();
})();
</script>
</body>
</html>

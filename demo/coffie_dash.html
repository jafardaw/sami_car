<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عناية سامي | لوحة تحكم المقهى</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#CE9234; --gold-b:#E8BE6C; --gold-d:#9C6B1F; --gold-soft:rgba(206,146,52,.09);
  --ink:#221F1F; --ink2:#3A3126; --mute:#8A7B6C; --soft:#B3A594;
  --bg:#FDFCF7; --panel:#FFFFFF; --sidebar:#1B140D; --line:rgba(140,110,80,.16); --line2:rgba(255,255,255,.08);
  --green:#1F9D57; --green-bg:#E7F6ED; --blue:#2F73C4; --blue-bg:#E7F0FA;
  --amber:#D68A1E; --amber-bg:#FBF0DC; --red:#C0503A; --red-bg:#FBEAE6;
  --ease:cubic-bezier(.33,.9,.35,1); --spring:cubic-bezier(.2,.9,.3,1.12); --dur:.22s;
  --fd:'Alexandria',sans-serif; --fb:'IBM Plex Sans Arabic',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--fb);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden}
img{max-width:100%;display:block}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}
a{color:inherit;text-decoration:none}
::selection{background:var(--gold);color:#fff}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:rgba(140,110,80,.28);border-radius:6px}
.layout{display:grid;grid-template-columns:256px 1fr;min-height:100vh}
/* ===== الشريط الجانبي ===== */
.side{background:var(--sidebar);color:#E7DECF;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;
  border-inline-start:1px solid var(--line2);z-index:40;transition:transform .3s var(--ease)}
.side .brand{display:flex;align-items:center;gap:11px;padding:20px 18px;border-bottom:1px solid var(--line2)}
.side .brand img{height:42px;width:auto}
.side .brand b{font-family:var(--fd);font-size:15px;color:#F3E7D0;display:block}
.side .brand small{font-size:8.5px;letter-spacing:.28em;color:var(--gold-b)}
.side .grp{padding:16px 12px 6px;font-size:10px;font-weight:700;color:var(--soft);letter-spacing:.05em}
.side nav{flex:1;overflow-y:auto;padding:0 12px}
.navi{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:13px;font-size:13.5px;font-weight:600;
  color:#C6B8A4;margin-bottom:3px;transition:all var(--dur) var(--ease);position:relative;width:100%;text-align:right}
.navi:hover{background:rgba(255,255,255,.05);color:#F3E7D0}
.navi.on{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:#fff;box-shadow:0 10px 22px -12px rgba(206,146,52,.7)}
.navi .ic{flex:none}
.navi .badge{margin-inline-start:auto;min-width:20px;height:20px;border-radius:10px;background:var(--red);color:#fff;
  font-size:10px;font-weight:800;display:grid;place-items:center;padding-inline:5px}
.navi.on .badge{background:rgba(255,255,255,.25)}
.side .foot{padding:14px;border-top:1px solid var(--line2);display:flex;align-items:center;gap:11px}
.side .foot .av{width:38px;height:38px;border-radius:11px;background:linear-gradient(140deg,var(--gold),var(--gold-d));
  color:#fff;display:grid;place-items:center;font-family:var(--fd);font-weight:800;flex:none}
.side .foot b{font-size:12.5px;color:#F3E7D0;display:block}
.side .foot small{font-size:10px;color:var(--soft)}
/* ===== المحتوى ===== */
.main{min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:30;background:rgba(253,252,247,.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);padding:14px 24px;display:flex;align-items:center;gap:14px}
.burger{display:none;width:40px;height:40px;border-radius:11px;border:1px solid var(--line);background:#fff;place-items:center}
.topbar .tt{flex:1}
.topbar .tt h1{font-family:var(--fd);font-size:19px;font-weight:800}
.topbar .tt p{font-size:11.5px;color:var(--mute);margin-top:2px}
.topbar .search{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:12px;
  padding:10px 14px;width:240px;color:var(--mute)}
.topbar .search input{border:none;background:none;outline:none;font-size:12.5px;flex:1;color:var(--ink)}
.topbar .ib{width:42px;height:42px;border-radius:12px;border:1px solid var(--line);background:#fff;display:grid;place-items:center;
  color:var(--ink2);position:relative;transition:var(--dur)}
.topbar .ib:hover{border-color:var(--gold);color:var(--gold-d)}
.topbar .ib .dot{position:absolute;top:9px;left:10px;width:8px;height:8px;border-radius:50%;background:var(--red);border:2px solid #fff}
.content{padding:24px;flex:1}
.page{display:none;animation:pgIn .35s var(--ease)}
.page.on{display:block}
@keyframes pgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
/* ===== عناصر عامة ===== */
.card{background:var(--panel);border:1px solid var(--line);border-radius:18px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:42px;padding:11px 20px;
  border-radius:12px;font-size:13px;font-weight:700;transition:transform .15s var(--ease),box-shadow var(--dur),opacity var(--dur)}
.btn:active{transform:scale(.97)}
.btn-g{background:linear-gradient(135deg,var(--gold-b),var(--gold));color:#fff;box-shadow:0 10px 22px -10px rgba(206,146,52,.55)}
.btn-o{border:1.5px solid var(--gold);color:var(--gold-d);background:#fff}
.btn-ghost{border:1px solid var(--line);color:var(--ink2);background:#fff}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold-d)}
.btn-sm{min-height:36px;padding:8px 14px;font-size:12px;border-radius:10px}
.btn:disabled{opacity:.5}
/* بطاقات الإحصاء */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px;position:relative;overflow:hidden}
.stat::after{content:"";position:absolute;top:-30px;left:-30px;width:100px;height:100px;border-radius:50%;background:var(--gold-soft)}
.stat .si{width:44px;height:44px;border-radius:13px;display:grid;place-items:center;color:#fff;margin-bottom:14px;position:relative;z-index:2}
.stat b{font-family:var(--fd);font-size:26px;font-weight:800;display:block;position:relative;z-index:2}
.stat small{font-size:12px;color:var(--mute);position:relative;z-index:2}
.stat .tr{position:absolute;top:18px;left:18px;font-size:11px;font-weight:800;display:flex;gap:3px;align-items:center;z-index:2}
.tr.up{color:var(--green)} .tr.down{color:var(--red)}
/* رأس القسم */
.sec-head{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.sec-head h2{font-family:var(--fd);font-size:17px;font-weight:800;display:flex;gap:9px;align-items:center}
.sec-head h2 .hi{width:34px;height:34px;border-radius:11px;background:var(--gold-soft);color:var(--gold-d);display:grid;place-items:center}
.sec-head .tools{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.chipf{display:flex;gap:6px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:4px}
.chipf button{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;color:var(--mute);transition:var(--dur)}
.chipf button.on{background:var(--ink);color:#fff}
/* الجداول */
.tbl-wrap{background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{text-align:right;font-size:11px;font-weight:700;color:var(--mute);padding:14px 16px;background:#FAF6EF;
  border-bottom:1px solid var(--line);white-space:nowrap}
tbody td{padding:13px 16px;font-size:13px;border-bottom:1px solid var(--line);vertical-align:middle}
tbody tr{transition:background var(--dur)}
tbody tr:hover{background:#FBF8F2}
tbody tr:last-child td{border-bottom:none}
.cell-b{display:flex;align-items:center;gap:11px}
.cell-b img{width:44px;height:44px;border-radius:11px;object-fit:cover;flex:none}
.cell-b .ph{width:44px;height:44px;border-radius:11px;background:var(--gold-soft);color:var(--gold-d);display:grid;place-items:center;flex:none}
.cell-b b{font-family:var(--fd);font-size:13px;display:block}
.cell-b small{font-size:11px;color:var(--mute)}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;padding:5px 12px;border-radius:999px}
.pill.on2{color:var(--green);background:var(--green-bg)}
.pill.off2{color:var(--mute);background:#F0EBE2}
.pill.g{color:var(--gold-d);background:var(--gold-soft)}
.pill i{width:6px;height:6px;border-radius:50%;background:currentColor}
/* مفتاح التبديل */
.sw{width:44px;height:25px;border-radius:999px;background:#DAD0C2;position:relative;transition:background var(--dur);flex:none}
.sw.on{background:var(--green)}
.sw::after{content:"";position:absolute;top:3px;right:3px;width:19px;height:19px;border-radius:50%;background:#fff;
  transition:transform var(--dur) var(--spring);box-shadow:0 2px 5px rgba(0,0,0,.25)}
.sw.on::after{transform:translateX(-19px)}
.rowacts{display:flex;gap:6px}
.iact{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);display:grid;place-items:center;color:var(--ink2);transition:var(--dur)}
.iact:hover{border-color:var(--gold);color:var(--gold-d)}
.iact.del:hover{border-color:var(--red);color:var(--red);background:var(--red-bg)}
/* شبكة بطاقات */
.grid-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
</style>
<style>
/* بطاقة منتج */
.pcard{background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden;transition:transform var(--dur) var(--ease),box-shadow var(--dur)}
.pcard:hover{transform:translateY(-4px);box-shadow:0 20px 40px -24px rgba(90,60,30,.4)}
.pcard .pim{position:relative;aspect-ratio:16/11;overflow:hidden;background:linear-gradient(150deg,#EFE7D8,#E4D8C2)}
.pcard .pim img{width:100%;height:100%;object-fit:cover}
.pcard .pim .cat{position:absolute;top:10px;right:10px;font-size:10px;font-weight:800;color:#fff;
  background:rgba(27,20,13,.72);backdrop-filter:blur(4px);border-radius:999px;padding:5px 12px}
.pcard .pim .av{position:absolute;top:10px;left:10px}
.pcard .pb{padding:14px}
.pcard .pb b{font-family:var(--fd);font-size:14px;display:block}
.pcard .pb p{font-size:11.5px;color:var(--mute);line-height:1.7;margin:5px 0 10px;min-height:32px}
.pcard .pb .rowp{display:flex;align-items:center;justify-content:space-between}
.pcard .pb .pr{font-family:var(--fd);font-size:18px;font-weight:800;color:var(--gold-d)}
.pcard .pb .pr small{font-size:11px;color:var(--mute)}
.pcard .pacts{display:flex;gap:6px;padding:0 14px 14px}
.pcard .pacts .btn{flex:1;min-height:36px;font-size:11.5px}
/* بطاقة طاولة */
.tcard{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px;text-align:center;position:relative;
  transition:transform var(--dur) var(--ease),box-shadow var(--dur)}
.tcard:hover{transform:translateY(-4px);box-shadow:0 20px 40px -24px rgba(90,60,30,.4)}
.tcard .tnum{position:absolute;top:14px;right:14px;font-family:var(--fd);font-size:13px;font-weight:800;color:var(--gold-d);
  background:var(--gold-soft);border-radius:10px;padding:5px 12px}
.tcard .qr{width:120px;height:120px;margin:6px auto 12px;border:1.5px solid var(--gold);border-radius:14px;padding:9px;background:#fff}
.tcard .qr canvas{width:100%;height:100%;image-rendering:pixelated}
.tcard b{font-family:var(--fd);font-size:15px;display:block}
.tcard small{font-size:11px;color:var(--mute);display:block;margin-top:3px}
.tcard .tacts{display:flex;gap:6px;margin-top:13px}
.tcard .tacts .btn{flex:1;min-height:36px;font-size:11.5px}
/* لوحة الطلبات (كانبان) */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;align-items:start}
.kcol{background:rgba(255,255,255,.5);border:1px solid var(--line);border-radius:18px;padding:14px;min-height:200px}
.kcol .kh{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-family:var(--fd);font-size:13.5px;font-weight:800}
.kcol .kh .kc{margin-inline-start:auto;min-width:22px;height:22px;border-radius:11px;background:#fff;border:1px solid var(--line);
  font-size:11px;font-weight:800;display:grid;place-items:center;padding-inline:6px;color:var(--mute)}
.kcol .kh .kd{width:9px;height:9px;border-radius:50%}
.ocard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px;margin-bottom:11px;
  animation:pgIn .3s var(--ease) both;transition:box-shadow var(--dur)}
.ocard:hover{box-shadow:0 12px 26px -18px rgba(90,60,30,.5)}
.ocard .oh{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.ocard .oh .tn{width:38px;height:38px;border-radius:11px;background:var(--ink);color:var(--gold-b);display:grid;place-items:center;
  font-family:var(--fd);font-weight:800;font-size:12px;flex:none;text-align:center;line-height:1.1}
.ocard .oh b{font-size:12.5px;font-family:var(--fd);display:block}
.ocard .oh small{font-size:10.5px;color:var(--mute)}
.ocard .oh .rf{margin-inline-start:auto;font-size:10px;color:var(--soft);font-weight:700}
.ocard .items{border-top:1px dashed var(--line);border-bottom:1px dashed var(--line);padding:9px 0;margin-bottom:10px;display:grid;gap:6px}
.ocard .items .it{display:flex;justify-content:space-between;font-size:11.5px}
.ocard .items .it .q{color:var(--gold-d);font-weight:800}
.ocard .items .it .nm{color:var(--ink2);flex:1;margin-inline-start:6px}
.ocard .obot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.ocard .obot .tot{font-family:var(--fd);font-size:15px;font-weight:800;color:var(--gold-d)}
.ocard .obot .tot small{font-size:10px;color:var(--mute)}
.ocard .nextb{min-height:34px;padding:7px 12px;font-size:11px;border-radius:10px;font-weight:800;display:inline-flex;gap:5px;align-items:center}
.ocard .timeline{display:flex;gap:4px;margin-top:10px}
.ocard .timeline i{flex:1;height:4px;border-radius:2px;background:#EAE1D4}
.ocard .timeline i.on{background:var(--green)}
/* Modal */
.modal-ov{position:fixed;inset:0;z-index:200;background:rgba(20,13,6,.5);backdrop-filter:blur(4px);
  opacity:0;pointer-events:none;transition:opacity .3s var(--ease);display:grid;place-items:center;padding:20px}
.modal-ov.on{opacity:1;pointer-events:auto}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:22px;width:min(480px,100%);max-height:90vh;overflow-y:auto;
  transform:translateY(20px) scale(.97);transition:transform .3s var(--spring)}
.modal-ov.on .modal{transform:none}
.modal .mh{display:flex;align-items:center;justify-content:space-between;padding:20px 22px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);z-index:2}
.modal .mh b{font-family:var(--fd);font-size:16px;font-weight:800}
.modal .mh .x{width:36px;height:36px;border-radius:10px;border:1px solid var(--line);display:grid;place-items:center;color:var(--mute);transition:var(--dur)}
.modal .mh .x:hover{border-color:var(--red);color:var(--red);transform:rotate(90deg)}
.modal .mb{padding:22px}
.fld{margin-bottom:16px}
.fld label{font-size:12px;font-weight:700;color:var(--ink2);display:block;margin-bottom:8px}
.fld input,.fld select,.fld textarea{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;
  font-size:13px;color:var(--ink);background:#FDFBF7;outline:none;transition:border-color var(--dur)}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(206,146,52,.13)}
.fld textarea{resize:none;min-height:80px}
.fld .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.img-drop{border:1.5px dashed var(--line);border-radius:14px;padding:20px;text-align:center;color:var(--mute);cursor:pointer;
  transition:var(--dur);position:relative;overflow:hidden}
.img-drop:hover{border-color:var(--gold);color:var(--gold-d);background:var(--gold-soft)}
.img-drop img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.img-drop .ph2{display:flex;flex-direction:column;gap:8px;align-items:center}
.seg{display:flex;gap:8px}
.seg button{flex:1;min-height:44px;border:1.5px solid var(--line);border-radius:12px;font-size:12.5px;font-weight:700;color:var(--mute);
  transition:var(--dur);display:flex;gap:7px;align-items:center;justify-content:center}
.seg button.on{border-color:var(--gold);background:var(--gold-soft);color:var(--gold-d)}
.modal .mf{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px;position:sticky;bottom:0;background:var(--panel)}
.modal .mf .btn{flex:1}
/* حالة فارغة */
.empty{padding:60px 24px;text-align:center;color:var(--mute)}
.empty .ei{width:74px;height:74px;margin:0 auto 16px;border-radius:20px;background:var(--gold-soft);color:var(--gold-d);display:grid;place-items:center}
.empty b{font-family:var(--fd);font-size:16px;color:var(--ink);display:block;margin-bottom:6px}
.empty p{font-size:12.5px;line-height:1.8;max-width:34ch;margin:0 auto 16px}
/* توست */
.toast{position:fixed;bottom:26px;right:50%;transform:translate(50%,20px);z-index:400;opacity:0;pointer-events:none;
  background:var(--ink);color:#fff;padding:13px 24px;border-radius:14px;font-size:13px;font-weight:600;
  display:flex;gap:9px;align-items:center;transition:all .35s var(--ease);box-shadow:0 18px 40px -14px rgba(0,0,0,.5)}
.toast.on{opacity:1;transform:translate(50%,0)}
.toast .ti{width:22px;height:22px;border-radius:50%;background:var(--green);display:grid;place-items:center;flex:none}
/* ===== الإعدادات ===== */
.set-grid{display:grid;grid-template-columns:230px 1fr;gap:20px;align-items:start}
.set-nav{position:sticky;top:88px;display:grid;gap:4px}
.set-nav button{display:flex;align-items:center;gap:11px;padding:12px 14px;border-radius:12px;font-size:13px;font-weight:600;
  color:var(--ink2);text-align:right;transition:all var(--dur)}
.set-nav button:hover{background:#fff}
.set-nav button.on{background:#fff;color:var(--gold-d);box-shadow:0 6px 16px -10px rgba(90,60,30,.4);border:1px solid var(--line)}
.set-nav button .ic{width:32px;height:32px;border-radius:9px;background:var(--gold-soft);color:var(--gold-d);display:grid;place-items:center;flex:none}
.set-nav button.on .ic{background:var(--gold);color:#fff}
.set-body{display:grid;gap:18px;min-width:0}
.set-card{background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden}
.set-card>.ch{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:11px}
.set-card>.ch .ci{width:36px;height:36px;border-radius:11px;background:var(--gold-soft);color:var(--gold-d);display:grid;place-items:center;flex:none}
.set-card>.ch b{font-family:var(--fd);font-size:14.5px;font-weight:800;display:block}
.set-card>.ch small{font-size:11px;color:var(--mute);display:block;margin-top:2px}
.set-card>.cb{padding:20px}
.set-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--line)}
.set-row:first-child{padding-top:0}
.set-row:last-child{border-bottom:none;padding-bottom:0}
.set-row .rt{flex:1;min-width:0}
.set-row .rt b{font-size:13px;font-weight:700;display:block}
.set-row .rt small{font-size:11px;color:var(--mute);display:block;margin-top:3px;line-height:1.6}
.set-row .rc{flex:none}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.fi label{font-size:12px;font-weight:700;color:var(--ink2);display:block;margin-bottom:7px}
.fi input,.fi select,.fi textarea{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:11px 13px;
  font-size:13px;color:var(--ink);background:#FDFBF7;outline:none;transition:border-color var(--dur)}
.fi input:focus,.fi select:focus,.fi textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(206,146,52,.13)}
.fi textarea{resize:none;min-height:70px}
.fi .suffix{position:relative}
.fi .suffix input{padding-inline-start:52px}
.fi .suffix span{position:absolute;inset-inline-start:0;top:0;bottom:0;width:44px;display:grid;place-items:center;
  font-size:12px;font-weight:800;color:var(--gold-d);border-inline-end:1px solid var(--line);pointer-events:none}
.days-pick{display:flex;flex-wrap:wrap;gap:8px}
.dbtn{min-height:40px;padding:9px 15px;border:1.5px solid var(--line);border-radius:11px;font-size:12px;font-weight:700;
  color:var(--mute);background:#fff;transition:var(--dur)}
.dbtn.on{border-color:var(--gold);background:var(--gold-soft);color:var(--gold-d)}
.theme-pick{display:flex;gap:12px;flex-wrap:wrap}
.tsw{width:64px;text-align:center;cursor:pointer}
.tsw .sw2{height:52px;border-radius:14px;border:2.5px solid transparent;transition:var(--dur);position:relative;overflow:hidden}
.tsw.on .sw2{border-color:var(--ink)}
.tsw.on .sw2::after{content:"";position:absolute;top:5px;left:5px;width:18px;height:18px;border-radius:50%;background:#fff;
  display:grid;place-items:center;box-shadow:0 2px 5px rgba(0,0,0,.25)}
.tsw small{font-size:10.5px;color:var(--mute);display:block;margin-top:6px;font-weight:700}
.tsw.on small{color:var(--ink)}
.danger-card{border-color:rgba(192,80,58,.3)}
.danger-card>.ch{border-bottom-color:rgba(192,80,58,.2)}
.danger-card>.ch .ci{background:var(--red-bg);color:var(--red)}
.btn-danger{border:1.5px solid rgba(192,80,58,.5);color:var(--red);background:#fff}
.btn-danger:hover{background:var(--red-bg)}
.save-bar{position:sticky;bottom:0;z-index:20;background:rgba(244,239,231,.92);backdrop-filter:blur(12px);
  border-top:1px solid var(--line);margin:6px -24px -24px;padding:14px 24px;display:flex;align-items:center;gap:12px}
.save-bar .msg{flex:1;font-size:12px;color:var(--mute);display:flex;gap:7px;align-items:center}
.save-bar .msg.dirty{color:var(--amber);font-weight:700}
.prev-card{background:linear-gradient(160deg,#241B10,#14100A);border-radius:16px;padding:18px;color:#F3E7D0;text-align:center}
.prev-card img{height:46px;margin:0 auto 12px}
.prev-card b{font-family:var(--fd);font-size:16px;display:block}
.prev-card small{font-size:11px;color:var(--gold-b);display:block;margin-top:4px}
.prev-card .pmeta{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px}
.prev-card .pmeta span{font-size:10.5px;background:rgba(206,146,52,.16);border:1px solid rgba(206,146,52,.35);
  border-radius:999px;padding:5px 12px;color:var(--gold-b)}
@media(max-width:900px){.set-grid{grid-template-columns:1fr}.set-nav{position:static;grid-auto-flow:column;overflow-x:auto;scrollbar-width:none}.set-nav button{flex:none}.f2,.f3{grid-template-columns:1fr}}
/* شارة QR كبيرة في مودال */
.qr-big{width:210px;height:210px;margin:0 auto 16px;border:2px solid var(--gold);border-radius:18px;padding:14px;background:#fff}
.qr-big canvas{width:100%;height:100%;image-rendering:pixelated}
/* استجابة */
@media(max-width:1100px){.stats-row{grid-template-columns:1fr 1fr}.kanban{grid-template-columns:1fr 1fr}}
@media(max-width:860px){
 .layout{grid-template-columns:1fr}
 .side{position:fixed;top:0;bottom:0;right:0;width:256px;transform:translateX(105%)}
 .side.open{transform:none;box-shadow:-20px 0 60px rgba(0,0,0,.4)}
 .burger{display:grid}
 .topbar .search{display:none}
 .content{padding:16px}
 .kanban{grid-template-columns:1fr}
 .stats-row{grid-template-columns:1fr 1fr;gap:12px}
}
.side-ov{position:fixed;inset:0;z-index:39;background:rgba(20,13,6,.5);opacity:0;pointer-events:none;transition:opacity .3s}
.side-ov.on{opacity:1;pointer-events:auto}
@media(min-width:861px){.side-ov{display:none}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>

function drawQR(cv,seed,px){
 if(!cv)return;const n=29,ctx=cv.getContext('2d');if(!ctx)return;
 const sc=px||6;cv.width=n*sc;cv.height=n*sc;
 ctx.fillStyle='#fff';ctx.fillRect(0,0,n*sc,n*sc);ctx.fillStyle='#1B140D';
 let s=seed;const rnd=()=>{s=(s*9301+49297)%233280;return s/233280};
 const fin=(x,y)=>{ctx.fillStyle='#1B140D';ctx.fillRect(x*sc,y*sc,7*sc,7*sc);
  ctx.fillStyle='#fff';ctx.fillRect((x+1)*sc,(y+1)*sc,5*sc,5*sc);
  ctx.fillStyle='#CE9234';ctx.fillRect((x+2)*sc,(y+2)*sc,3*sc,3*sc);ctx.fillStyle='#1B140D'};
 for(let y=0;y<n;y++)for(let x=0;x<n;x++){
  const inF=(x<8&&y<8)||(x>n-9&&y<8)||(x<8&&y>n-9);
  if(!inF&&rnd()>.53)ctx.fillRect(x*sc,y*sc,sc,sc);
 }
 fin(0,0);fin(n-7,0);fin(0,n-7);
 // شعار وسطي مصغّر
 const c=n*sc/2;ctx.fillStyle='#fff';ctx.fillRect(c-4*sc,c-4*sc,8*sc,8*sc);
 ctx.strokeStyle='#CE9234';ctx.lineWidth=sc*.7;ctx.strokeRect(c-3*sc,c-3*sc,6*sc,6*sc);
}

function modalOrder(id) {

            const active = idx <= st.step;
            const current = idx === st.step;
            return `
              <div style="z-index:2;display:flex;flex-direction:column;align-items:center;width:60px">
                <span style="width:22px;height:22px;border-radius:50%;background:${active ? 'var(--gold)' : '#fff'};border:2px solid ${active ? 'var(--gold)' : '#E5DEC9'};display:grid;place-items:center;color:${active ? '#fff' : 'var(--mute)'};font-size:10px;font-weight:800">
                  ${active ? '✓' : idx + 1}

                  ${STATUS[sCode].n}
                </span>
              </div>

          }).join('')}

      closeModal();
    };
  }
}

  </div>
  <div class="mf"><button class="btn btn-ghost" data-close>إلغاء</button><button class="btn btn-g" id="saveCat">${id?'حفظ التعديل':'إضافة القسم'}</button></div>`);
 bindStatusSeg();
 $('#saveCat').addEventListener('click',()=>{
  const n=$('#cN').value.trim();if(!n)return toast('أدخل اسم القسم','<path d="M12 8v5M12 16h.01"/>');
  const d=$('#cD').value.trim();
  if(id){const x=catOf(id);x.n=n;x.desc=d;x.on=tmpStatus}
  else DB.cats.push({id:'c'+Date.now(),n,desc:d,on:tmpStatus});
  save();closeModal();render();toast(id?'تم تحديث القسم':'تمت إضافة القسم');
 });
}
function modalDrink(id){
 editId=id;const d=id?DB.drinks.find(x=>x.id===id):null;tmpStatus=d?d.on:true;tmpImg=d?d.img:null;
 openModal(`<div class="mh"><b>${id?'تعديل المشروب':'إضافة مشروب جديد'}</b><button class="x" data-close>${svg('<path d="M18 6L6 18M6 6l12 12"/>',15)}</button></div>
  <div class="mb">
   <div class="fld"><label>صورة المشروب</label>
    <div class="img-drop" id="imgDrop">${tmpImg?`<img src="${tmpImg}" alt="">`:`<div class="ph2">${svg('<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/>',26)}<span style="font-size:12px">اضغط لرفع صورة أو الصق رابطًا</span></div>`}</div>
    <input id="dImg" placeholder="أو الصق رابط الصورة هنا" style="margin-top:8px;width:100%;border:1.5px solid var(--line);border-radius:12px;padding:10px 14px;font-size:12px;background:#FDFBF7;outline:none" value="${tmpImg||''}">
   </div>
   <div class="fld"><label>اسم المشروب</label><input id="dN" placeholder="مثال: لاتيه" value="${d?d.n:''}"></div>
   <div class="fld"><label>وصف المشروب</label><textarea id="dD" placeholder="وصف مختصر">${d?d.desc:''}</textarea></div>
   <div class="fld"><div class="two">
    <div><label>السعر (ر.س)</label><input id="dP" type="number" inputmode="decimal" placeholder="0" value="${d?d.pr:''}"></div>
    <div><label>القسم</label><select id="dC">${DB.cats.map(c=>`<option value="${c.id}" ${d&&d.cat===c.id?'selected':''}>${c.n}</option>`).join('')}</select></div>
   </div></div>
   <div class="fld"><label>الحالة</label><div class="seg">
    <button class="stg ${tmpStatus?'on':''}" data-st="1">${svg('<path d="M20 6L9 17l-5-5"/>',14)} متاح</button>
    <button class="stg ${!tmpStatus?'on':''}" data-st="0">${svg('<path d="M18 6L6 18M6 6l12 12"/>',14)} غير متاح</button>
   </div></div>
  </div>
  <div class="mf"><button class="btn btn-ghost" data-close>إلغاء</button><button class="btn btn-g" id="saveDrink">${id?'حفظ التعديل':'إضافة المشروب'}</button></div>`);
 bindStatusSeg();
 $('#dImg').addEventListener('input',e=>{tmpImg=e.target.value;const dr=$('#imgDrop');if(tmpImg)dr.innerHTML=`<img src="${tmpImg}" alt="" onerror="this.remove()">`});
 $('#imgDrop').addEventListener('click',()=>{$('#dImg').focus();toast('الصق رابط الصورة في الحقل أدناه')});
 $('#saveDrink').addEventListener('click',()=>{
  const n=$('#dN').value.trim(),p=parseFloat($('#dP').value)||0,cat=$('#dC').value;
  if(!n)return toast('أدخل اسم المشروب','<path d="M12 8v5M12 16h.01"/>');
  if(!DB.cats.length)return toast('أضف قسمًا أولًا','<path d="M12 8v5M12 16h.01"/>');
  const img=tmpImg||IMG.hot, desc=$('#dD').value.trim();
  if(id){const x=DB.drinks.find(y=>y.id===id);Object.assign(x,{n,pr:p,cat,img,desc,on:tmpStatus})}
  else DB.drinks.push({id:'d'+Date.now(),cat,n,desc,pr:p,img,on:tmpStatus});
  save();closeModal();render();toast(id?'تم تحديث المشروب':'تمت إضافة المشروب');
 });
}
function modalTable(){
 const nextN=Math.max(0,...DB.tables.map(t=>t.n))+1;
 openModal(`<div class="mh"><b>إضافة طاولة جديدة</b><button class="x" data-close>${svg('<path d="M18 6L6 18M6 6l12 12"/>',15)}</button></div>
  <div class="mb">
   <div class="fld"><div class="two">
    <div><label>رقم الطاولة</label><input id="tN" type="number" value="${nextN}"></div>
    <div><label>عدد المقاعد</label><input id="tS" type="number" value="4"></div>
   </div></div>
   <div style="background:var(--gold-soft);border:1px solid var(--line);border-radius:14px;padding:16px;text-align:center">
    <div class="qr-big" style="width:150px;height:150px;margin:0 auto 10px;padding:10px"><canvas id="previewQr"></canvas></div>
    <small style="font-size:11.5px;color:var(--gold-d);font-weight:700">سيُنشأ رمز QR تلقائيًا عند الحفظ</small>
   </div>
  </div>
  <div class="mf"><button class="btn btn-ghost" data-close>إلغاء</button><button class="btn btn-g" id="saveTable">${svg('<path d="M12 5v14M5 12h14"/>',14)} إنشاء الطاولة و QR</button></div>`);
 drawQR($('#previewQr'),nextN*777+13,5);
 $('#tN').addEventListener('input',e=>drawQR($('#previewQr'),(parseInt(e.target.value)||1)*777+13,5));
 $('#saveTable').addEventListener('click',()=>{
  const n=parseInt($('#tN').value)||nextN,s=parseInt($('#tS').value)||4;
  if(DB.tables.some(t=>t.n===n))return toast('رقم الطاولة مستخدم','<path d="M12 8v5M12 16h.01"/>');
  DB.tables.push({id:'t'+Date.now(),n,seats:s,on:true});
  save();closeModal();render();toast('تم إنشاء الطاولة ورمز QR الخاص بها 🎉');
 });
}
function modalShowQR(n){
 const url=`${location.origin.replace(/[^/]*$/,'')}menu.html?table=${n}`;
 openModal(`<div class="mh"><b>رمز QR — طاولة ${rs(n)}</b><button class="x" data-close>${svg('<path d="M18 6L6 18M6 6l12 12"/>',15)}</button></div>
  <div class="mb" style="text-align:center">
   <div class="qr-big"><canvas id="bigQr"></canvas></div>
   <b style="font-family:var(--fd);font-size:16px">طاولة رقم ${rs(n)}</b>
   <p style="font-size:12px;color:var(--mute);margin:8px 0 4px;line-height:1.8">اطبع هذا الرمز وضعه على الطاولة.<br>عند مسحه ينتقل العميل مباشرةً لصفحة الطلب.</p>
   <div style="background:#FAF6EF;border:1px solid var(--line);border-radius:11px;padding:10px 14px;font-size:11px;color:var(--mute);direction:ltr;margin-top:10px;word-break:break-all">${url}</div>
  </div>
  <div class="mf"><button class="btn btn-ghost" data-close>إغلاق</button>
   <button class="btn btn-g" id="printQr">${svg('<path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z"/>',14)} طباعة الرمز</button></div>`);
 drawQR($('#bigQr'),n*777+13,8);
 $('#printQr').addEventListener('click',()=>{window.print();});
}
function bindStatusSeg(){
 $$('.stg').forEach(b=>b.addEventListener('click',()=>{tmpStatus=b.dataset.st==='1';
  $$('.stg').forEach(x=>x.classList.toggle('on',x===b))}));
}
/* ================= العرض والربط ================= */
const PAGES={
 overview:{t:'نظرة عامة',s:'ملخص أداء المقهى اليوم',fn:overview},
 orders:{t:'إدارة الطلبات',s:'الطلبات الواردة من الطاولات عبر QR',fn:ordersPage},
 menu:{t:'المشروبات',s:'إدارة قائمة مشروبات المقهى',fn:menuPage},
 cats:{t:'الأقسام',s:'أقسام المشروبات والتحكم بحالتها',fn:catsPage},
 tables:{t:'الطاولات',s:'إدارة الطاولات ورموز QR',fn:tablesPage},
 settings:{t:'الإعدادات',s:'إعدادات المقهى العامة والتشغيلية',fn:settingsPage},
};
function syncBadge(){
 const active=DB.orders.filter(o=>o.status==='new').length;
 const b=$('#ordBadge');b.textContent=rs(active);b.style.display=active?'grid':'none';
}
function render(){
 const p=PAGES[S.page];
 $('#pgTitle').textContent=p.t;$('#pgSub').textContent=p.s;
 $('#content').innerHTML=`<div class="page on">${p.fn()}</div>`;
 $$('.navi').forEach(n=>n.classList.toggle('on',n.dataset.page===S.page));
 syncBadge();
 // ارسم رموز QR في صفحة الطاولات
 if(S.page==='tables')$$('canvas[data-qr]').forEach(cv=>drawQR(cv,parseInt(cv.dataset.qr)*777+13,4));
 bindPage();
 if(S.page==='settings'){bindSettings();updateSaveBar()}
}
function bindPage(){
 $$('[data-goto]').forEach(b=>b.addEventListener('click',()=>{S.page=b.dataset.goto;render()}));
 // الأقسام
 $$('[data-catf]').forEach(b=>b.addEventListener('click',()=>{S.catFilter=b.dataset.catf;render()}));
 $$('[data-toggle-cat]').forEach(b=>b.addEventListener('click',()=>{const c=catOf(b.dataset.toggleCat);c.on=!c.on;save();render();toast(c.on?'تم تفعيل القسم':'تم إيقاف القسم')}));
 $$('[data-edit-cat]').forEach(b=>b.addEventListener('click',()=>modalCat(b.dataset.editCat)));
 $$('[data-del-cat]').forEach(b=>b.addEventListener('click',()=>{
  const id=b.dataset.delCat;const cnt=DB.drinks.filter(d=>d.cat===id).length;
  if(cnt&&!confirm(`سيتم حذف القسم و${cnt} مشروب مرتبط به. متابعة؟`))return;
  DB.cats=DB.cats.filter(c=>c.id!==id);DB.drinks=DB.drinks.filter(d=>d.cat!==id);
  save();render();toast('تم حذف القسم');
 }));
 // المشروبات
 $$('[data-menuf]').forEach(b=>b.addEventListener('click',()=>{S.menuFilter=b.dataset.menuf;render()}));
 $$('[data-toggle-drink]').forEach(b=>b.addEventListener('click',()=>{const d=DB.drinks.find(x=>x.id===b.dataset.toggleDrink);d.on=!d.on;save();render();toast(d.on?'المشروب متاح الآن':'تم إخفاء المشروب')}));
 $$('[data-edit-drink]').forEach(b=>b.addEventListener('click',()=>modalDrink(b.dataset.editDrink)));
 $$('[data-del-drink]').forEach(b=>b.addEventListener('click',()=>{
  if(!confirm('حذف هذا المشروب؟'))return;
  DB.drinks=DB.drinks.filter(d=>d.id!==b.dataset.delDrink);save();render();toast('تم حذف المشروب');
 }));
 // الطاولات
 $$('[data-del-table]').forEach(b=>b.addEventListener('click',()=>{
  if(!confirm('حذف هذه الطاولة ورمزها؟'))return;
  DB.tables=DB.tables.filter(t=>t.id!==b.dataset.delTable);save();render();toast('تم حذف الطاولة');
 }));
 $$('[data-showqr]').forEach(b=>b.addEventListener('click',()=>modalShowQR(parseInt(b.dataset.showqr))));
 // الطلبات
 $$('[data-order]').forEach(el=>{
  el.addEventListener('click',e=>{
   if(e.target.closest('[data-next]'))return;
   modalOrder(el.dataset.order);
  });
 });
 $$('[data-next]').forEach(b=>b.addEventListener('click',()=>{
  const o=DB.orders.find(x=>x.id===b.dataset.next);
  o.status=NEXT[o.status];save();render();toast('تم تحديث الطلب إلى: '+STATUS[o.status].n);
 }));
 const rf=$('#refreshOrd');if(rf)rf.addEventListener('click',()=>{render();toast('تم تحديث قائمة الطلبات')});
 // إضافة عبر المودال
 $$('[data-modal]').forEach(b=>b.addEventListener('click',()=>{
  const m=b.dataset.modal;if(m==='cat')modalCat();else if(m==='drink')modalDrink();else if(m==='table')modalTable();
 }));
}
/* ================= ربط الإعدادات ================= */
function applyDraft(){ DB.settings=JSON.parse(JSON.stringify(setDraft())); save(); S.setDirty=false; }
function bindSettings(){
 // تبويبات الإعدادات
 $$('[data-settab]').forEach(b=>b.addEventListener('click',()=>{S.setTab=b.dataset.settab;render()}));
 // حقول نصية / رقمية / قوائم
 $$('[data-set]').forEach(el=>{
  const k=el.dataset.set;
  const ev=(el.type==='number')?'input':(el.tagName==='SELECT'||el.type==='time')?'change':'input';
  el.addEventListener(ev,()=>{
   let v=el.value;
   if(el.type==='number')v=parseFloat(v)||0;
   setField(k,v);
  });
 });
 // مفاتيح التبديل
 $$('[data-set-toggle]').forEach(b=>b.addEventListener('click',()=>{
  const k=b.dataset.setToggle; setField(k,!setDraft()[k]); b.classList.toggle('on',setDraft()[k]);
 }));
 // أيام العمل
 $$('[data-set-day]').forEach(b=>b.addEventListener('click',()=>{
  const d=b.dataset.setDay; const w=setDraft().workdays;
  const i=w.indexOf(d); if(i>=0)w.splice(i,1); else w.push(d);
  S.setDirty=true; b.classList.toggle('on',w.includes(d)); updateSaveBar();
 }));
 // اختيار الثيم
 $$('[data-set-theme]').forEach(b=>b.addEventListener('click',()=>{
  setField('theme',b.dataset.setTheme);
  $$('[data-set-theme]').forEach(x=>x.classList.toggle('on',x===b));
 }));
 // حفظ / تجاهل
 const sv=$('#setSave'); if(sv)sv.addEventListener('click',()=>{applyDraft();render();toast('تم حفظ الإعدادات بنجاح ✓')});
 const rs2=$('#setReset'); if(rs2)rs2.addEventListener('click',()=>{S.setDraft=null;S.setDirty=false;render();toast('تم تجاهل التغييرات')});
 // تجربة الإشعار
 const tn=$('#testNotif'); if(tn)tn.addEventListener('click',()=>toast('طلب جديد من طاولة رقم ٣ 🔔','<path d="M18 8a6 6 0 00-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>'));
 // تصدير البيانات
 const ex=$('#exportData'); if(ex)ex.addEventListener('click',()=>{
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='samicafe-backup-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();a.remove();toast('تم تصدير نسخة احتياطية');
 });
 const im=$('#importData'); const imf=$('#importFile');
 if(im&&imf){im.addEventListener('click',()=>imf.click());
  imf.addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;
   const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);
    if(!d.cats||!d.drinks)throw 0; DB=withDefaults(d);save();S.setDraft=null;S.setDirty=false;render();toast('تم استيراد النسخة بنجاح');
   }catch(err){toast('ملف غير صالح','<path d="M12 8v5M12 16h.01"/>')}};r.readAsText(f);
  });
 }
 // مسح الطلبات
 const co=$('#clearOrders'); if(co)co.addEventListener('click',()=>{
  if(!confirm('مسح جميع الطلبات نهائيًا؟'))return;
  DB.orders=[];save();toast('تم مسح جميع الطلبات');render();
 });
 // إعادة ضبط المصنع
 const fr=$('#factoryReset'); if(fr)fr.addEventListener('click',()=>{
  if(!confirm('سيتم حذف كل البيانات والعودة للإعدادات الافتراضية. متابعة؟'))return;
  try{localStorage.removeItem(KEY)}catch(e){}
  DB=JSON.parse(JSON.stringify(SEED));save();S.setDraft=null;S.setDirty=false;S.setTab='general';render();toast('تمت إعادة الضبط للوضع الافتراضي');
 });
}

/* التنقل */
$$('.navi[data-page]').forEach(n=>n.addEventListener('click',()=>{
 if(S.page==='settings'&&n.dataset.page!=='settings'&&S.setDirty){
  if(!confirm('لديك تغييرات غير محفوظة في الإعدادات. المغادرة دون حفظ؟'))return;
 }
 if(n.dataset.page!=='settings'){S.setDraft=null;S.setDirty=false}
 S.page=n.dataset.page;render();closeSide();
}));
$$('.navi[data-ext]').forEach(n=>n.addEventListener('click',()=>window.open(n.dataset.ext,'_blank')));
$('#modalOv').addEventListener('click',e=>{if(e.target===$('#modalOv'))closeModal()});
document.addEventListener('click',e=>{if(e.target.closest('[data-close]'))closeModal()});
/* الشريط الجانبي للجوال */
function closeSide(){$('#side').classList.remove('open');$('#sideOv').classList.remove('on')}
$('#burger').addEventListener('click',()=>{$('#side').classList.add('open');$('#sideOv').classList.add('on')});
$('#sideOv').addEventListener('click',closeSide);
/* مزامنة الطلبات الجديدة من واجهة العميل (نفس المتصفح) */
window.addEventListener('storage',e=>{if(e.key===KEY){DB=load();render();
 if(S.page!=='orders')toast('طلب جديد وصل من إحدى الطاولات 🔔','<path d="M18 8a6 6 0 00-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>')}});

setInterval(()=>{const fresh=load();if(fresh.orders.length!==DB.orders.length){DB=fresh;render()}},4000);
render();
})();
</script>
</body>
</html>
